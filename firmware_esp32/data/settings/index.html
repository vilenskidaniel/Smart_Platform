<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Smart Platform / Settings</title>
  <style>
    :root {
      --bg: #dce5dd;
      --panel: rgba(251, 252, 248, 0.92);
      --panel-strong: #f9fcf6;
      --panel-soft: rgba(255, 255, 255, 0.62);
      --panel-glass: rgba(249, 252, 246, 0.76);
      --ink: #1a2620;
      --muted: #657469;
      --line: rgba(52, 79, 61, 0.14);
      --line-strong: rgba(52, 79, 61, 0.24);
      --accent: #2f5d43;
      --accent-soft: rgba(47, 93, 67, 0.12);
      --accent-strong: #214331;
      --hero-a: rgba(30, 61, 43, 0.98);
      --hero-b: rgba(71, 108, 79, 0.96);
      --hero-c: rgba(168, 193, 145, 0.52);
      --hero-ink: #f3fbf2;
      --ok: #2f7d4d;
      --ok-soft: rgba(47, 125, 77, 0.14);
      --warn: #9b6619;
      --warn-soft: rgba(155, 102, 25, 0.14);
      --fault: #a43a3a;
      --fault-soft: rgba(164, 58, 58, 0.14);
      --shadow: 0 24px 54px rgba(21, 33, 25, 0.12);
      --radius: 28px;
      --radius-sm: 20px;
      --display: "Bahnschrift SemiCondensed", "Arial Narrow", "Trebuchet MS", sans-serif;
      --sans: "Segoe UI Variable Text", "Segoe UI", "Trebuchet MS", sans-serif;
      --mono: "Consolas", "SFMono-Regular", monospace;
      --page-gap: 18px;
      --section-pad: 20px;
      --shell-safe-top: calc(var(--smart-platform-bar-height, 56px) + 18px);
    }

    body[data-theme="dawn"] {
      --bg: #e7ddd1;
      --panel: rgba(255, 249, 239, 0.92);
      --panel-strong: #fffbf3;
      --panel-soft: rgba(255, 248, 236, 0.7);
      --panel-glass: rgba(255, 250, 241, 0.82);
      --ink: #302217;
      --muted: #7c6956;
      --line: rgba(120, 86, 54, 0.15);
      --line-strong: rgba(120, 86, 54, 0.25);
      --accent: #8b5d2b;
      --accent-soft: rgba(139, 93, 43, 0.12);
      --accent-strong: #6e451e;
      --hero-a: rgba(98, 60, 24, 0.98);
      --hero-b: rgba(153, 105, 52, 0.96);
      --hero-c: rgba(224, 188, 126, 0.46);
      --hero-ink: #fff8ef;
      --ok: #68843b;
      --ok-soft: rgba(104, 132, 59, 0.14);
      --warn: #9d6418;
      --warn-soft: rgba(157, 100, 24, 0.14);
      --fault: #a24239;
      --fault-soft: rgba(162, 66, 57, 0.14);
      --shadow: 0 24px 54px rgba(60, 37, 17, 0.12);
    }

    body[data-theme="studio"] {
      --bg: #dce2e7;
      --panel: rgba(248, 251, 253, 0.92);
      --panel-strong: #fcfdfe;
      --panel-soft: rgba(255, 255, 255, 0.68);
      --panel-glass: rgba(248, 251, 253, 0.82);
      --ink: #18232a;
      --muted: #62717a;
      --line: rgba(57, 84, 103, 0.15);
      --line-strong: rgba(57, 84, 103, 0.24);
      --accent: #31546b;
      --accent-soft: rgba(49, 84, 107, 0.12);
      --accent-strong: #213b4c;
      --hero-a: rgba(25, 48, 61, 0.98);
      --hero-b: rgba(68, 97, 118, 0.96);
      --hero-c: rgba(158, 184, 198, 0.48);
      --hero-ink: #f5fbfe;
      --ok: #326f60;
      --ok-soft: rgba(50, 111, 96, 0.14);
      --warn: #93662b;
      --warn-soft: rgba(147, 102, 43, 0.14);
      --fault: #9c4141;
      --fault-soft: rgba(156, 65, 65, 0.14);
      --shadow: 0 24px 54px rgba(18, 34, 43, 0.12);
    }

    body[data-density="compact"] {
      --page-gap: 14px;
      --section-pad: 16px;
      --radius: 24px;
      --radius-sm: 18px;
    }

    * { box-sizing: border-box; }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: var(--sans);
      color: var(--ink);
      background:
        radial-gradient(circle at top left, color-mix(in srgb, var(--hero-c) 74%, transparent), transparent 34%),
        radial-gradient(circle at right center, color-mix(in srgb, var(--accent-soft) 58%, transparent), transparent 28%),
        linear-gradient(180deg, color-mix(in srgb, var(--panel-strong) 68%, white) 0%, var(--bg) 100%);
      transition: background 180ms ease, color 180ms ease;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.06) 1px, transparent 1px);
      background-size: 22px 22px;
      mask-image: linear-gradient(180deg, rgba(0, 0, 0, 0.2), transparent 74%);
      opacity: 0.26;
    }

    a { color: inherit; }

    button,
    input {
      font: inherit;
    }

    .page {
      position: relative;
      z-index: 1;
      max-width: 1460px;
      margin: 0 auto;
      height: 100vh;
      min-height: 100vh;
      padding: calc(var(--shell-safe-top) + 8px) 18px 24px;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      gap: var(--page-gap);
    }

    .card {
      background: var(--panel-glass);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
    }

    .hero {
      padding: 6px 2px 0;
      background: transparent;
      border: 0;
      box-shadow: none;
      backdrop-filter: none;
      color: var(--ink);
    }

    .hero::after {
      display: none;
    }

    .hero-head {
      display: flex;
      justify-content: space-between;
      gap: 20px;
      flex-wrap: wrap;
      align-items: flex-start;
    }

    .hero-copy {
      display: block;
      max-width: none;
    }

    .hero-kicker,
    .section-kicker,
    .panel-kicker,
    .metric-kicker,
    .rail-kicker {
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    .hero h1,
    .section-title,
    .rail-title,
    .metric-title {
      margin: 0;
      font-family: var(--display);
      letter-spacing: -0.03em;
    }

    .hero h1 {
      font-size: clamp(38px, 5.4vw, 60px);
      line-height: 0.92;
    }

    .hero p,
    .section-copy,
    .section-note,
    .muted,
    .rail-copy,
    .metric-copy,
    .detail-copy {
      margin: 0;
      line-height: 1.55;
    }

    .hero p {
      display: none;
    }

    .hero-pills,
    .hero-actions,
    .chip-row,
    .option-row,
    .action-row,
    .rail-actions,
    .status-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .pill,
    .status-chip,
    .hero-link,
    .inline-chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 36px;
      padding: 8px 13px;
      border-radius: 999px;
      font-size: 13px;
      line-height: 1;
      text-decoration: none;
      border: 1px solid var(--line);
    }

    .pill,
    .hero-link {
      border-color: rgba(255, 255, 255, 0.16);
      background: rgba(255, 255, 255, 0.08);
      color: inherit;
    }

    .status-chip,
    .inline-chip {
      background: var(--panel-soft);
      color: var(--muted);
    }

    .pill[data-tone="ok"],
    .status-chip[data-tone="ok"],
    .inline-chip[data-tone="ok"] {
      background: var(--ok-soft);
      color: var(--ok);
      border-color: color-mix(in srgb, var(--ok) 24%, transparent);
    }

    .pill[data-tone="warn"],
    .status-chip[data-tone="warn"],
    .inline-chip[data-tone="warn"] {
      background: var(--warn-soft);
      color: var(--warn);
      border-color: color-mix(in srgb, var(--warn) 24%, transparent);
    }

    .pill[data-tone="fault"],
    .status-chip[data-tone="fault"],
    .inline-chip[data-tone="fault"] {
      background: var(--fault-soft);
      color: var(--fault);
      border-color: color-mix(in srgb, var(--fault) 24%, transparent);
    }

    .settings-shell {
      display: grid;
      grid-template-columns: 300px minmax(0, 1fr);
      gap: var(--page-gap);
      align-items: stretch;
      min-height: 0;
      overflow: hidden;
    }

    .settings-rail,
    .section-panel,
    .detail-card,
    .metric-card,
    .perk-card,
    .theme-card,
    .empty-state,
    .candidate-card {
      background: linear-gradient(180deg, color-mix(in srgb, var(--panel-strong) 86%, white), color-mix(in srgb, var(--panel-strong) 92%, var(--bg)));
    }

    .settings-rail {
      position: sticky;
      top: var(--shell-safe-top);
      padding: var(--section-pad);
      display: grid;
      gap: 14px;
      min-height: 0;
      max-height: 100%;
      overflow: auto;
      overscroll-behavior: contain;
      scrollbar-gutter: stable;
    }

    .rail-block {
      display: grid;
      gap: 10px;
      padding: 14px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--line);
      background: var(--panel-soft);
    }

    .rail-title {
      font-size: 26px;
      line-height: 0.98;
    }

    .rail-copy {
      color: var(--muted);
      font-size: 14px;
    }

    .search-shell {
      position: relative;
    }

    .search-input {
      width: 100%;
      min-height: 48px;
      padding: 12px 14px;
      border-radius: 16px;
      border: 1px solid var(--line);
      background: color-mix(in srgb, var(--panel-strong) 82%, white);
      color: var(--ink);
      outline: none;
      transition: border-color 160ms ease, box-shadow 160ms ease, background 160ms ease;
    }

    .search-input:focus {
      border-color: color-mix(in srgb, var(--accent) 34%, transparent);
      box-shadow: 0 0 0 4px color-mix(in srgb, var(--accent) 10%, transparent);
    }

    .rail-nav {
      display: grid;
      gap: 8px;
    }

    .rail-button {
      appearance: none;
      width: 100%;
      text-align: left;
      padding: 12px 14px;
      border-radius: 18px;
      border: 1px solid var(--line);
      background: color-mix(in srgb, var(--panel-strong) 82%, white);
      color: var(--ink);
      cursor: pointer;
      display: grid;
      gap: 4px;
      transition: transform 150ms ease, border-color 150ms ease, background 150ms ease, box-shadow 150ms ease;
    }

    .rail-button:hover,
    .rail-button:focus-visible {
      transform: translateY(-1px);
      border-color: color-mix(in srgb, var(--accent) 28%, transparent);
      background: color-mix(in srgb, var(--accent) 7%, white);
      outline: none;
    }

    .rail-button[data-active="true"] {
      border-color: color-mix(in srgb, var(--accent) 36%, transparent);
      background: linear-gradient(180deg, color-mix(in srgb, var(--accent) 12%, white), color-mix(in srgb, var(--accent) 6%, white));
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.6);
    }

    .rail-button strong {
      font-size: 15px;
      line-height: 1.2;
    }

    .rail-button span {
      display: none;
    }

    .action-button,
    .ghost-button {
      appearance: none;
      border: 1px solid var(--line);
      background: color-mix(in srgb, var(--panel-strong) 82%, white);
      color: var(--ink);
      border-radius: 16px;
      min-height: 42px;
      padding: 10px 14px;
      text-decoration: none;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: transform 150ms ease, border-color 150ms ease, background 150ms ease;
    }

    .action-button:hover,
    .action-button:focus-visible,
    .ghost-button:hover,
    .ghost-button:focus-visible {
      transform: translateY(-1px);
      border-color: color-mix(in srgb, var(--accent) 28%, transparent);
      background: color-mix(in srgb, var(--accent) 7%, white);
      outline: none;
    }

    .settings-detail {
      min-width: 0;
      display: grid;
      gap: var(--page-gap);
      min-height: 0;
      max-height: 100%;
      overflow: auto;
      overscroll-behavior: contain;
      padding-right: 4px;
      scrollbar-gutter: stable;
    }

    .section-panel {
      padding: var(--section-pad);
      display: grid;
      gap: 16px;
      scroll-margin-top: calc(var(--shell-safe-top) + 12px);
    }

    .section-head {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-start;
      flex-wrap: wrap;
    }

    .section-kicker,
    .panel-kicker,
    .metric-kicker,
    .rail-kicker {
      color: var(--accent);
    }

    .section-title {
      font-size: clamp(28px, 4vw, 40px);
      line-height: 0.98;
    }

    .section-copy,
    .detail-copy,
    .metric-copy,
    .section-note,
    .muted {
      color: var(--muted);
    }

    .section-stack,
    .detail-stack,
    .toggle-list,
    .info-stack,
    .diagnostics-stack {
      display: grid;
      gap: 12px;
    }

    .overview-grid,
    .detail-grid,
    .perk-grid,
    .theme-grid,
    .sync-grid {
      display: grid;
      gap: 12px;
    }

    .overview-grid {
      grid-template-columns: repeat(12, minmax(0, 1fr));
    }

    .detail-grid,
    .theme-grid,
    .sync-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .perk-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .metric-card {
      grid-column: span 3;
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: 22px;
      display: grid;
      gap: 10px;
    }

    .metric-card[data-span="6"] {
      grid-column: span 6;
    }

    .metric-card[data-tone="ok"] {
      border-color: color-mix(in srgb, var(--ok) 22%, transparent);
    }

    .metric-card[data-tone="warn"] {
      border-color: color-mix(in srgb, var(--warn) 22%, transparent);
    }

    .metric-card[data-tone="fault"] {
      border-color: color-mix(in srgb, var(--fault) 22%, transparent);
    }

    .metric-title {
      font-size: clamp(22px, 3vw, 30px);
      line-height: 1;
    }

    .metric-stack,
    .info-stack {
      display: grid;
      gap: 10px;
    }

    .metric-row,
    .info-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
      padding-top: 10px;
      border-top: 1px solid var(--line);
      font-size: 14px;
    }

    .metric-row:first-child,
    .info-row:first-child {
      padding-top: 0;
      border-top: 0;
    }

    .metric-row strong,
    .info-row strong {
      color: var(--ink);
    }

    .metric-row span:last-child,
    .info-row span:last-child {
      text-align: right;
      color: var(--ink);
      min-width: 0;
      max-width: 62%;
      overflow-wrap: anywhere;
      word-break: break-word;
    }

    .detail-card,
    .candidate-card {
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: 22px;
      display: grid;
      gap: 12px;
    }

    .panel-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      align-items: flex-start;
    }

    .panel-title {
      margin: 0;
      font-size: 22px;
      line-height: 1.04;
      letter-spacing: -0.02em;
      font-family: var(--display);
    }

    .toggle {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 14px;
      align-items: center;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: var(--panel-soft);
    }

    .toggle.is-disabled {
      opacity: 0.72;
    }

    .toggle-copy {
      display: grid;
      gap: 0;
    }

    .toggle-copy strong {
      font-size: 14px;
      line-height: 1.3;
    }

    .toggle-copy span {
      display: none;
    }

    .switch {
      appearance: none;
      position: relative;
      width: 52px;
      height: 30px;
      margin: 0;
      border-radius: 999px;
      border: 1px solid var(--line-strong);
      background: rgba(120, 132, 122, 0.18);
      cursor: pointer;
      transition: background 160ms ease, border-color 160ms ease;
    }

    .switch::after {
      content: "";
      position: absolute;
      top: 3px;
      left: 3px;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: #ffffff;
      box-shadow: 0 3px 8px rgba(18, 28, 21, 0.18);
      transition: transform 160ms ease;
    }

    .switch:checked {
      background: var(--accent);
      border-color: color-mix(in srgb, var(--accent) 70%, #ffffff);
    }

    .switch:checked::after {
      transform: translateX(22px);
    }

    .switch:disabled {
      cursor: not-allowed;
    }

    .option-chip,
    .theme-option {
      position: relative;
      display: inline-flex;
    }

    .option-chip input,
    .theme-option input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .option-chip span {
      min-height: 42px;
      padding: 10px 14px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: color-mix(in srgb, var(--panel-strong) 84%, white);
      color: var(--muted);
      font-size: 13px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      transition: border-color 160ms ease, background 160ms ease, color 160ms ease;
    }

    .option-chip input:checked + span {
      color: var(--accent);
      border-color: color-mix(in srgb, var(--accent) 40%, transparent);
      background: color-mix(in srgb, var(--accent) 11%, white);
    }

    .theme-grid {
      align-items: stretch;
    }

    .theme-card {
      min-height: 148px;
      border-radius: 22px;
      border: 1px solid var(--line);
      padding: 16px;
      cursor: pointer;
      display: grid;
      gap: 12px;
      transition: transform 150ms ease, border-color 150ms ease, box-shadow 150ms ease;
    }

    .theme-card[data-theme-preview="meadow"] {
      background: linear-gradient(180deg, rgba(50, 93, 67, 0.18), rgba(249, 252, 246, 0.96));
    }

    .theme-card[data-theme-preview="dawn"] {
      background: linear-gradient(180deg, rgba(139, 93, 43, 0.18), rgba(255, 251, 243, 0.96));
    }

    .theme-card[data-theme-preview="studio"] {
      background: linear-gradient(180deg, rgba(49, 84, 107, 0.18), rgba(252, 253, 254, 0.96));
    }

    .theme-card:hover,
    .theme-card:focus-within {
      transform: translateY(-2px);
      border-color: color-mix(in srgb, var(--accent) 28%, transparent);
      box-shadow: 0 14px 24px rgba(19, 31, 23, 0.08);
    }

    .status-chip[title],
    .inline-chip[title],
    .rail-button[title],
    .metric-card[title],
    .detail-card[title],
    .candidate-card[title],
    .toggle[title],
    .action-button[title],
    .ghost-button[title],
    .theme-card[title],
    .search-input[title] {
      cursor: help;
    }

    .theme-option input:checked + .theme-card {
      border-color: color-mix(in srgb, var(--accent) 42%, transparent);
      box-shadow: inset 0 0 0 1px color-mix(in srgb, var(--accent) 20%, transparent);
    }

    .theme-name {
      font-family: var(--display);
      font-size: 24px;
      line-height: 1;
      margin: 0;
    }

    .theme-swatch-row {
      display: flex;
      gap: 8px;
    }

    .theme-swatch {
      width: 26px;
      height: 26px;
      border-radius: 999px;
      border: 1px solid rgba(0, 0, 0, 0.08);
    }

    .theme-card[data-theme-preview="meadow"] .theme-swatch:nth-child(1) { background: #274d38; }
    .theme-card[data-theme-preview="meadow"] .theme-swatch:nth-child(2) { background: #588062; }
    .theme-card[data-theme-preview="meadow"] .theme-swatch:nth-child(3) { background: #dce5dd; }
    .theme-card[data-theme-preview="dawn"] .theme-swatch:nth-child(1) { background: #7e4f21; }
    .theme-card[data-theme-preview="dawn"] .theme-swatch:nth-child(2) { background: #c28e4e; }
    .theme-card[data-theme-preview="dawn"] .theme-swatch:nth-child(3) { background: #f2e6d8; }
    .theme-card[data-theme-preview="studio"] .theme-swatch:nth-child(1) { background: #254556; }
    .theme-card[data-theme-preview="studio"] .theme-swatch:nth-child(2) { background: #69859a; }
    .theme-card[data-theme-preview="studio"] .theme-swatch:nth-child(3) { background: #e1e8ec; }

    .perk-grid {
      align-items: stretch;
    }

    .perk-card {
      border: 1px solid var(--line);
      border-radius: 22px;
      padding: 16px;
      display: grid;
      gap: 14px;
    }

    .perk-card.is-disabled {
      opacity: 0.76;
    }

    .perk-copy {
      display: grid;
      gap: 6px;
    }

    .perk-title {
      margin: 0;
      font-size: 22px;
      font-family: var(--display);
      line-height: 1.02;
      letter-spacing: -0.02em;
    }

    .perk-copy p {
      margin: 0;
      color: var(--muted);
      line-height: 1.5;
      font-size: 14px;
    }

    .perk-toggle {
      margin-top: auto;
    }

    details {
      border: 1px solid var(--line);
      border-radius: 18px;
      background: var(--panel-soft);
      overflow: hidden;
    }

    summary {
      cursor: pointer;
      padding: 12px 14px;
      font-weight: 700;
      list-style: none;
    }

    summary::-webkit-details-marker {
      display: none;
    }

    .code-block {
      margin: 0;
      padding: 0 14px 14px;
      white-space: pre-wrap;
      overflow: auto;
      font: 12px/1.5 var(--mono);
      color: #e8f5e8;
      background: #152019;
      min-height: 170px;
    }

    .empty-state {
      padding: 28px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      display: grid;
      gap: 12px;
      text-align: center;
      place-items: center;
    }

    .empty-state h2 {
      margin: 0;
      font-family: var(--display);
      font-size: 34px;
      line-height: 1;
    }

    .toast-stack {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 30;
      display: grid;
      gap: 10px;
      pointer-events: none;
    }

    .toast {
      min-width: min(360px, calc(100vw - 36px));
      padding: 14px 16px;
      border-radius: 18px;
      border: 1px solid var(--line);
      background: rgba(249, 252, 246, 0.96);
      color: var(--ink);
      box-shadow: 0 18px 36px rgba(18, 30, 22, 0.14);
    }

    .toast[data-tone="ok"] {
      border-color: color-mix(in srgb, var(--ok) 22%, transparent);
    }

    .toast[data-tone="warn"] {
      border-color: color-mix(in srgb, var(--warn) 22%, transparent);
    }

    .toast strong {
      display: block;
      margin-bottom: 4px;
    }

    @media (max-width: 1220px) {
      .metric-card {
        grid-column: span 6;
      }
    }

    @media (max-width: 1100px) {
      .page {
        height: auto;
        min-height: 100vh;
      }

      .settings-shell {
        grid-template-columns: minmax(0, 1fr);
        overflow: visible;
      }

      .settings-rail {
        position: static;
        max-height: none;
        overflow: visible;
      }

      .rail-nav {
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      }

      .settings-detail {
        max-height: none;
        overflow: visible;
      }
    }

    @media (max-width: 860px) {
      .overview-grid,
      .detail-grid,
      .perk-grid,
      .theme-grid,
      .sync-grid,
      .rail-nav {
        grid-template-columns: 1fr;
      }

      .metric-card,
      .metric-card[data-span="6"] {
        grid-column: span 1;
      }
    }

    @media (max-width: 760px) {
      .page {
        height: auto;
        min-height: 100vh;
        padding-inline: 12px;
        padding-bottom: 42px;
      }

      .hero,
      .settings-rail,
      .section-panel,
      .empty-state,
      .toast {
        border-radius: 24px;
      }

      .hero-head,
      .section-head,
      .metric-row,
      .info-row {
        flex-direction: column;
      }

      .metric-row span:last-child,
      .info-row span:last-child {
        text-align: left;
        max-width: none;
      }

      .toggle {
        grid-template-columns: minmax(0, 1fr);
      }

      .rail-nav {
        display: flex;
        gap: 8px;
        overflow-x: auto;
        padding-bottom: 2px;
      }

      .rail-button {
        min-width: 220px;
      }

      .toast-stack {
        left: 12px;
        right: 12px;
        bottom: 12px;
      }
    }
  </style>
</head>

      turretSmokeTip: 'Страница запущена в режиме desktop smoke. Экран турели доступен только как предпросмотр, пока реальное Raspberry Pi устройство не подключено.',

      moduleDegradedTip: 'Модуль доступен, но одна или несколько runtime-проверок пока ограничивают его.',
      moduleLockedTip: 'Модуль намеренно заблокирован текущим состоянием владения или безопасности.',

      storagePathTip: 'Корневая папка контента на этом хосте. Длинный путь сокращён, чтобы не ломать раскладку.',
    });
    const state = {
      snapshot: null,
      content: null,
      sync: null,
      settings: normalizeSettings(DEFAULT_SETTINGS),
      settingsStorage: 'loading',
      saveState: 'idle',
      saveMessage: '',
      runtimeError: '',
      saveResetTimer: 0,
      searchQuery: '',
      activeSection: 'overview',
      pendingScrollId: '',
      toastTimer: 0,
    };

    function esc(value) {
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function tipAttrs(text) {
      const normalized = String(text || '').trim();
      if (!normalized) {
        return '';
      }
      const safe = esc(normalized);
      return ` title="${safe}" aria-label="${safe}"`;
    }

    function readStorage(key) {
      try {
        return window.localStorage.getItem(key);
      } catch (_error) {
        return null;
      }
    }

    function writeStorage(key, value) {
      try {
        window.localStorage.setItem(key, value);
      } catch (_error) {
        return;
      }
    }

    function clone(value) {
      return JSON.parse(JSON.stringify(value));
    }

    function isSmokeRuntime(snapshot) {
      return String((((snapshot || {}).current_shell || {}).runtime_profile || '')).trim().toLowerCase() === 'desktop_smoke';
    }

    function compactPathLabel(value) {
      const text = String(value || '').trim();
      if (!text) {
        return '-';
      }
      if (text.length <= 36) {
        return text;
      }
      const normalized = text.replace(/\\/g, '/');
      const segments = normalized.split('/').filter(Boolean);
      if (segments.length <= 4) {
        return text;
      }
      return `.../${segments.slice(-4).join('/')}`;
    }

    function boolValue(value, fallback) {
      if (typeof value === 'boolean') {
        return value;
      }
      if (typeof value === 'string') {
        return ['1', 'true', 'yes', 'on'].includes(value.trim().toLowerCase());
      }
      return fallback;
    }

    function choiceValue(value, allowed, fallback) {
      const normalized = String(value ?? '').trim().toLowerCase();
      return allowed.includes(normalized) ? normalized : fallback;
    }

    function numberValue(value, fallback) {
      const parsed = Number(value);
      return Number.isFinite(parsed) ? parsed : fallback;
    }

    function normalizeSettings(raw) {
      const payload = raw && typeof raw === 'object' ? raw : {};
      const interfaceSettings = payload.interface && typeof payload.interface === 'object' ? payload.interface : {};
      const styleSettings = payload.style && typeof payload.style === 'object' ? payload.style : {};
      const syncSettings = payload.synchronization && typeof payload.synchronization === 'object' ? payload.synchronization : {};
      const turretPolicies = payload.turret_policies && typeof payload.turret_policies === 'object' ? payload.turret_policies : {};
      const irrigationSettings = payload.irrigation && typeof payload.irrigation === 'object' ? payload.irrigation : {};

      return {
        schema_version: 'settings.v1',
        updated_at_ms: numberValue(payload.updated_at_ms, 0),
        interface: {
          language: choiceValue(interfaceSettings.language, ['en', 'ru'], 'en'),
          desktop_controls_enabled: boolValue(interfaceSettings.desktop_controls_enabled, true),
          fullscreen_enabled: boolValue(interfaceSettings.fullscreen_enabled, false),
          show_advanced_diagnostics: boolValue(interfaceSettings.show_advanced_diagnostics, false),
        },
        style: {
          theme: choiceValue(styleSettings.theme, ['meadow', 'dawn', 'studio'], 'meadow'),
          density: choiceValue(styleSettings.density, ['comfortable', 'compact'], 'comfortable'),
        },
        synchronization: {
          preferred_mode: choiceValue(syncSettings.preferred_mode, ['auto', 'manual_review'], 'auto'),
          prefer_peer_continuity: boolValue(syncSettings.prefer_peer_continuity, true),
        },
        turret_policies: {
          silent_observation: boolValue(turretPolicies.silent_observation, true),
          allow_animal_deterrence: boolValue(turretPolicies.allow_animal_deterrence, true),
          allow_auto_water_action: boolValue(turretPolicies.allow_auto_water_action, false),
          return_to_warm_standby: boolValue(turretPolicies.return_to_warm_standby, true),
          do_not_target_people: true,
        },
        irrigation: {
          prefer_driest_zone: boolValue(irrigationSettings.prefer_driest_zone, true),
          block_automatic_during_service: boolValue(irrigationSettings.block_automatic_during_service, true),
          require_sensor_health: boolValue(irrigationSettings.require_sensor_health, true),
        },
      };
    }

    function normalizeSyncPayload(raw) {
      const payload = raw && typeof raw === 'object' ? raw : {};
      if (Object.prototype.hasOwnProperty.call(payload, 'enabled')) {
        return {
          source: 'rpi',
          enabled: !!payload.enabled,
          last_push_ok: !!payload.last_push_ok,
          last_sync_ms: numberValue(payload.last_sync_ms, 0),
          last_error: String(payload.last_error || ''),
          peer_reachable: !!(((state.snapshot || {}).nodes || {}).peer || {}).reachable,
          peer_sync_ready: !!(((state.snapshot || {}).nodes || {}).peer || {}).sync_ready,
          raw: payload,
        };
      }
      return {
        source: 'esp32',
        enabled: true,
        last_push_ok: !!payload.peer_sync_ready,
        last_sync_ms: 0,
        last_error: '',
        peer_reachable: !!payload.peer_reachable,
        peer_sync_ready: !!payload.peer_sync_ready,
        raw: payload,
      };
    }

    function t(key) {
      const language = (state.settings && state.settings.interface && state.settings.interface.language) || 'en';
      const dictionary = COPY[language] || COPY.en;
      return dictionary[key] || COPY.en[key] || key;
    }

    function setDeepValue(target, path, value) {
      const segments = path.split('.');
      let cursor = target;
      while (segments.length > 1) {
        const segment = segments.shift();
        if (!cursor[segment] || typeof cursor[segment] !== 'object') {
          cursor[segment] = {};
        }
        cursor = cursor[segment];
      }
      cursor[segments[0]] = value;
    }

    function applyVisualSettings() {
      document.body.dataset.theme = state.settings.style.theme;
      document.body.dataset.density = state.settings.style.density;
      document.documentElement.lang = state.settings.interface.language;
      document.title = state.settings.interface.language === 'ru' ? 'Smart Platform / Настройки' : 'Smart Platform / Settings';
      writeStorage(DESKTOP_CONTROLS_KEY, state.settings.interface.desktop_controls_enabled ? '1' : '0');
      writeStorage(FULLSCREEN_STORAGE_KEY, state.settings.interface.fullscreen_enabled ? '1' : '0');
      writeStorage(SETTINGS_LANGUAGE_KEY, state.settings.interface.language);
    }

    function broadcastSettingsUpdate() {
      try {
        window.dispatchEvent(new CustomEvent('smart-platform:settings-updated', {
          detail: clone(state.settings),
        }));
      } catch (_error) {
        return;
      }
    }

    async function fetchJson(url, options) {
      const response = await fetch(url, Object.assign({ cache: 'no-store' }, options || {}));
      if (!response.ok) {
        throw new Error(`${response.status} ${response.statusText}`.trim());
      }
      return response.json();
    }

    async function fetchSyncJson() {
      try {
        return await fetchJson('/api/v1/sync/status');
      } catch (_statusError) {
        return fetchJson('/api/v1/sync/state');
      }
    }

    async function loadSettings() {
      try {
        const payload = await fetchJson('/api/v1/settings');
        state.settings = normalizeSettings(payload);
        state.settingsStorage = 'server';
        state.saveMessage = '';
      } catch (_error) {
        const raw = readStorage(SETTINGS_FALLBACK_KEY);
        if (raw) {
          try {
            state.settings = normalizeSettings(JSON.parse(raw));
          } catch (_parseError) {
            state.settings = normalizeSettings(DEFAULT_SETTINGS);
          }
        }
        state.settingsStorage = 'browser';
      }
      applyVisualSettings();
      broadcastSettingsUpdate();
    }

    function showToast(title, body, tone) {
      const toastStack = document.getElementById('toast-stack');
      if (!toastStack) {
        return;
      }
      toastStack.innerHTML = `
        <div class="toast" data-tone="${esc(tone || 'ok')}">
          <strong>${esc(title)}</strong>
          <div>${esc(body)}</div>
        </div>
      `;
      window.clearTimeout(state.toastTimer);
      state.toastTimer = window.setTimeout(() => {
        toastStack.innerHTML = '';
      }, 2400);
    }

    async function saveSettings(nextSettings) {
      state.saveState = 'saving';
      state.saveMessage = '';
      state.settings = normalizeSettings(nextSettings);
      applyVisualSettings();
      broadcastSettingsUpdate();
      render();

      try {
        const payload = await fetchJson('/api/v1/settings', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(state.settings),
        });
        state.settings = normalizeSettings(payload);
        state.settingsStorage = 'server';
        state.saveMessage = '';
        showToast(t('savedServer'), t('settingsHint'), 'ok');
      } catch (_error) {
        writeStorage(SETTINGS_FALLBACK_KEY, JSON.stringify(state.settings));
        state.settingsStorage = 'browser';
        state.saveMessage = t('saveFallbackHint');
        showToast(t('savedBrowser'), t('saveFallbackHint'), 'warn');
      }

      state.saveState = 'saved';
      window.clearTimeout(state.saveResetTimer);
      state.saveResetTimer = window.setTimeout(() => {
        state.saveState = 'idle';
        renderHero();
        renderRail();
      }, 1400);
      render();
    }

    function routeModeLabel(value) {
      const normalized = String(value || '').toLowerCase();
      if (normalized === 'local') {
        return t('routeLocal');
      }
      if (normalized === 'handoff') {
        return t('routeHandoff');
      }
      if (normalized === 'blocked') {
        return t('routeBlocked');
      }
      if (normalized === 'virtual') {
        return t('routeVirtual');
      }
      return t('routeUnknown');
    }

    function healthLabel(value) {
      const normalized = String(value || '').toLowerCase();
      if (normalized === 'online') {
        return t('online');
      }
      if (normalized === 'offline') {
        return t('offline');
      }
      if (normalized === 'degraded') {
        return t('degraded');
      }
      if (normalized === 'blocked') {
        return t('blocked');
      }
      if (normalized === 'ready') {
        return t('ready');
      }
      if (normalized === 'pending') {
        return t('pending');
      }
      return normalized || t('routeUnknown');
    }

    function toneForState(value) {
      const normalized = String(value || '').toLowerCase();
      if (['online', 'ready'].includes(normalized)) {
        return 'ok';
      }
      if (['offline', 'fault', 'blocked'].includes(normalized)) {
        return 'fault';
      }
      return 'warn';
    }

    function lastSavedLabel() {
      if (!state.settings.updated_at_ms) {
        return t('notYet');
      }
      return new Date(state.settings.updated_at_ms).toLocaleString(state.settings.interface.language);
    }

    function syncStateLabel() {
      const sync = state.sync || {};
      if (!sync.enabled) {
        return t('localOnly');
      }
      if (!sync.peer_reachable) {
        return t('offline');
      }
      if (sync.peer_sync_ready || sync.last_push_ok) {
        return t('ready');
      }
      return t('pending');
    }

    function localizedNodeSummary(node, fallbackKey) {
      const summary = String((node || {}).summary || '').trim();
      if (summary === 'Local shell is active') {
        return t('localShellActive');
      }
      if (summary === 'Peer owner is offline') {
        return t('peerOwnerOffline');
      }
      if (summary === 'Peer is visible but sync is pending') {
        return t('peerVisiblePending');
      }
      if (summary === 'Peer owner is ready') {
        return t('peerOwnerReady');
      }
      return summary || t(fallbackKey);
    }

    function persistenceInfo() {
      if (state.settingsStorage === 'server') {
        return {
          label: t('deviceStorageLabel'),
          tone: 'ok',
          tip: t('deviceStorageTip'),
        };
      }
      return {
        label: t('browserStorageLabel'),
        tone: 'warn',
        tip: t('browserStorageTip'),
      };
    }

    function moduleDisplayState(module) {
      if (!module) {
        return { label: t('routeUnknown'), tone: 'warn', tip: t('moduleLockedTip') };
      }

      if (isSmokeRuntime(state.snapshot) && module.id === 'turret_bridge') {
        return { label: t('previewState'), tone: 'warn', tip: t('turretSmokeTip') };
      }

      if (module.state === 'fault') {
        return { label: t('fault'), tone: 'fault', tip: t('moduleFaultTip') };
      }
      if (module.state === 'service') {
        return { label: t('serviceMode'), tone: 'warn', tip: t('moduleDegradedTip') };
      }
      if (module.state === 'degraded') {
        return { label: t('degraded'), tone: 'warn', tip: t('moduleDegradedTip') };
      }
      if (module.state === 'locked') {
        return { label: t('blocked'), tone: 'warn', tip: module.id === 'irrigation' ? t('irrigationOfflineTip') : t('moduleLockedTip') };
      }
      if (module.id === 'irrigation' && !module.owner_available) {
        return { label: t('offline'), tone: 'warn', tip: t('irrigationOfflineTip') };
      }
      return { label: t('ready'), tone: 'ok', tip: t('moduleReadyTip') };
    }

    function moduleById(id) {
      const cards = (state.snapshot && state.snapshot.module_cards) || [];
      return cards.find((item) => item.id === id) || null;
    }

    function infoRow(label, value) {
      return `<div class="info-row"><strong>${esc(label)}</strong><span>${esc(value)}</span></div>`;
    }

    function metricRow(label, value) {
      return `<div class="metric-row"><strong>${esc(label)}</strong><span>${esc(value)}</span></div>`;
    }

    function radioChip(path, value, label, currentValue) {
      const id = `${path.replace(/\./g, '-')}-${value}`;
      return `
        <label class="option-chip" for="${esc(id)}"${tipAttrs(label)}>
          <input id="${esc(id)}" type="radio" name="${esc(path)}" data-setting-path="${esc(path)}" value="${esc(value)}" ${value === currentValue ? 'checked' : ''}>
          <span>${esc(label)}</span>
        </label>
      `;
    }

    function toggleControl(path, checked, title, hint, disabled) {
      return `
        <label class="toggle${disabled ? ' is-disabled' : ''}"${tipAttrs(hint)}>
          <span class="toggle-copy">
            <strong>${esc(title)}</strong>
          </span>
          <input class="switch" type="checkbox" data-setting-path="${esc(path)}" ${checked ? 'checked' : ''} ${disabled ? 'disabled' : ''}>
        </label>
      `;
    }

    function metricCard(card) {
      return `
        <article class="metric-card" data-tone="${esc(card.tone)}" data-span="${esc(card.span || '3')}"${tipAttrs(card.tip || card.body)}>
          <div class="metric-kicker">${esc(card.eyebrow)}</div>
          <h3 class="metric-title">${esc(card.title)}</h3>
          <p class="metric-copy">${esc(card.body)}</p>
          <div class="metric-stack">${card.metrics.map((metric) => metricRow(metric[0], metric[1])).join('')}</div>
        </article>
      `;
    }

    function detailCard(kicker, title, body, contentHtml) {
      return `
        <div class="detail-card"${tipAttrs(body)}>
          <div class="panel-head">
            <div>
              <div class="panel-kicker">${esc(kicker)}</div>
              <h3 class="panel-title">${esc(title)}</h3>
            </div>
          </div>
          ${contentHtml}
        </div>
      `;
    }

    function perkCard(path, checked, title, hint, disabled) {
      return `
        <article class="perk-card${disabled ? ' is-disabled' : ''}"${tipAttrs(hint)}>
          <div class="panel-head">
            <span class="inline-chip" data-tone="${disabled ? 'warn' : 'ok'}">${esc(disabled ? t('perkDisabled') : t('perkLive'))}</span>
          </div>
          <div class="perk-copy">
            <h3 class="perk-title">${esc(title)}</h3>
          </div>
          <div class="perk-toggle">
            ${toggleControl(path, checked, title, hint, disabled)}
          </div>
        </article>
      `;
    }

    function themeOption(value, title, body, currentValue) {
      const id = `style-theme-${value}`;
      return `
        <label class="theme-option" for="${esc(id)}">
          <input id="${esc(id)}" type="radio" name="style.theme" data-setting-path="style.theme" value="${esc(value)}" ${value === currentValue ? 'checked' : ''}>
          <span class="theme-card" data-theme-preview="${esc(value)}"${tipAttrs(body)}>
            <span class="theme-swatch-row">
              <span class="theme-swatch"></span>
              <span class="theme-swatch"></span>
              <span class="theme-swatch"></span>
            </span>
            <span>
              <strong class="theme-name">${esc(title)}</strong>
            </span>
            <span class="detail-copy">${esc(body)}</span>
          </span>
        </label>
      `;
    }

    function sectionIdFromHash(hashValue) {
      const raw = String(hashValue || window.location.hash || '').replace(/^#/, '').trim().toLowerCase();
      return SECTION_ORDER.includes(raw) ? raw : '';
    }

    function ensureActiveSection(visibleSections) {
      const ids = visibleSections.map((section) => section.id);
      if (!ids.length) {
        state.activeSection = 'overview';
        return;
      }
      if (!ids.includes(state.activeSection)) {
        state.activeSection = ids[0];
      }
    }

    function syncHash(sectionId) {
      if (!sectionId || state.searchQuery) {
        return;
      }
      try {
        window.history.replaceState(null, '', `#${sectionId}`);
      } catch (_error) {
        return;
      }
    }

    function matchesSearch(section, query) {
      if (!query) {
        return true;
      }
      return section.searchText.includes(query);
    }

    function buildSections() {
      const snapshot = state.snapshot || {};
      const current = ((snapshot.nodes || {}).current || {});
      const peer = ((snapshot.nodes || {}).peer || {});
      const shell = snapshot.current_shell || {};
      const navigation = snapshot.navigation || {};
      const content = state.content || {};
      const irrigationModule = moduleById('irrigation') || {};
      const turretModule = moduleById('turret_bridge') || {};
      const sync = state.sync || {};
      const persistence = persistenceInfo();
      const turretStatus = moduleDisplayState(turretModule);
      const irrigationStatus = moduleDisplayState(irrigationModule);
      const syncCards = [
        {
          eyebrow: t('syncEnabled'),
          title: sync.enabled ? t('online') : t('localOnly'),
          tone: sync.enabled ? 'ok' : 'warn',
          body: t('syncLead'),
          metrics: [[t('preferredMode'), state.settings.synchronization.preferred_mode === 'auto' ? t('auto') : t('manualReview')]],
        },
        {
          eyebrow: t('syncState'),
          title: syncStateLabel(),
          tone: toneForState(syncStateLabel()),
          body: sync.last_error || t('settingsHint'),
          metrics: [[t('peerReachability'), sync.peer_reachable ? t('online') : t('offline')]],
        },
      ];

    function filteredSections() {
      const query = state.searchQuery.trim().toLowerCase();
      return buildSections().filter((section) => matchesSearch(section, query));
    }

    function isMobileSectionLayout() {
      return window.matchMedia('(max-width: 760px)').matches;
    }

    function renderHero() {
      document.getElementById('hero').innerHTML = `
        <div class="hero-head">
          <div class="hero-copy">
            <h1>${esc(t('pageTitle'))}</h1>
          </div>
        </div>
      `;
    }

    function renderRail() {
      const sections = filteredSections();
      ensureActiveSection(sections);
      const snapshot = state.snapshot || {};
      const current = ((snapshot.nodes || {}).current || {});
      const peer = ((snapshot.nodes || {}).peer || {});
      const persistence = persistenceInfo();
      document.getElementById('settings-rail').innerHTML = `
        <div class="rail-block">
          <div class="rail-kicker">${esc(t('searchSettings'))}</div>
          <h2 class="rail-title"${tipAttrs(t('searchLead'))}>${esc(t('searchSettings'))}</h2>
          <div class="search-shell">
            <input class="search-input" type="search" data-action="search-settings" placeholder="${esc(t('searchPlaceholder'))}" value="${esc(state.searchQuery)}"${tipAttrs(t('searchLead'))}>
          </div>
          ${state.searchQuery ? `<button class="ghost-button" type="button" data-action="clear-search"${tipAttrs(t('clearFilter'))}>${esc(t('clearFilter'))}</button>` : ''}
        </div>
        <div class="rail-block">
          <div class="rail-kicker">${esc(t('visibleSections'))}</div>
          <p class="rail-copy">${esc(t('visibleSections'))}: ${sections.length}</p>
          <div class="rail-nav">
            ${sections.map((section) => `
              <button class="rail-button" type="button" data-section-target="${esc(section.id)}" data-active="${section.id === state.activeSection ? 'true' : 'false'}"${tipAttrs(section.summary)}>
                <strong>${esc(section.title)}</strong>
                <span>${esc(section.summary)}</span>
              </button>
            `).join('')}
          </div>
        </div>
        <div class="rail-block">
          <div class="rail-kicker">${esc(t('runtimeSummary'))}</div>
          <div class="info-stack">
            ${infoRow(t('currentShell'), current.title || 'Raspberry Pi')}
            ${infoRow(t('peerShell'), peer.title || 'ESP32')}
            ${infoRow(t('settingsShort'), persistence.label)}
            ${infoRow(t('lastSaved'), lastSavedLabel())}
            ${infoRow(t('syncState'), syncStateLabel())}
          </div>
        </div>
        <div class="rail-block">
          <div class="rail-kicker">${esc(t('quickActions'))}</div>
          <div class="rail-actions">
            <a class="action-button" href="/"${tipAttrs(t('backToShell'))}>${esc(t('backToShell'))}</a>
            <a class="action-button" href="/gallery"${tipAttrs(t('gallery'))}>${esc(t('gallery'))}</a>
            <a class="action-button" href="/service"${tipAttrs(t('laboratory'))}>${esc(t('laboratory'))}</a>
            <a class="action-button" href="/gallery?tab=reports"${tipAttrs(t('reports'))}>${esc(t('reports'))}</a>
            <button class="action-button" type="button" data-action="refresh-runtime"${tipAttrs(t('refreshLiveData'))}>${esc(t('refreshLiveData'))}</button>
          </div>
        </div>
      `;
    }

    function renderDetail() {
      const sections = filteredSections();
      ensureActiveSection(sections);
      syncHash(state.activeSection);
      const detail = document.getElementById('settings-detail');
      if (!sections.length) {
        detail.innerHTML = `
          <section class="empty-state">
            <h2>${esc(t('searchEmptyTitle'))}</h2>
            <p class="muted">${esc(t('searchEmptyBody'))}</p>
            <button class="action-button" type="button" data-action="clear-search">${esc(t('clearFilter'))}</button>
          </section>
        `;
        return;
      }
      const renderedSections = isMobileSectionLayout()
        ? sections.filter((section) => section.id === state.activeSection)
        : sections;
      detail.innerHTML = renderedSections.map((section) => section.html).join('');
      if (state.pendingScrollId) {
        const targetId = state.pendingScrollId;
        state.pendingScrollId = '';
        window.requestAnimationFrame(() => {
          const element = document.getElementById(targetId);
          if (element) {
            element.scrollIntoView({ behavior: 'smooth', block: 'start' });
          }
        });
      }
    }

    function render(preserveSearchFocus) {
      const hadSearchFocus = preserveSearchFocus;
      applyVisualSettings();
      renderHero();
      renderRail();
      renderDetail();
      if (hadSearchFocus) {
        const input = document.querySelector('[data-action="search-settings"]');
        if (input instanceof HTMLInputElement) {
          input.focus();
          input.setSelectionRange(input.value.length, input.value.length);
        }
      }
    }

    async function refreshRuntime() {
      try {
        const [snapshot, contentStatus, syncPayload] = await Promise.all([
          fetchJson('/api/v1/shell/snapshot'),
          fetchJson('/api/v1/content/status'),
          fetchSyncJson(),
        ]);
        state.snapshot = snapshot;
        state.content = contentStatus;
        state.sync = normalizeSyncPayload(syncPayload);
        state.runtimeError = '';
      } catch (error) {
        state.runtimeError = `Settings runtime load error: ${error}`;
      }
      render();
    }

    document.addEventListener('input', (event) => {
      const target = event.target;
      if (!(target instanceof HTMLInputElement)) {
        return;
      }
      if (target.dataset.action === 'search-settings') {
        state.searchQuery = String(target.value || '').trim().toLowerCase();
        render(true);
      }
    });

    document.addEventListener('change', (event) => {
      const target = event.target;
      if (!(target instanceof HTMLInputElement)) {
        return;
      }
      if (target.dataset.action === 'search-settings') {
        return;
      }
      const path = target.dataset.settingPath;
      if (!path) {
        return;
      }
      const nextSettings = clone(state.settings);
      setDeepValue(nextSettings, path, target.type === 'checkbox' ? target.checked : target.value);
      saveSettings(nextSettings).catch((error) => {
        state.runtimeError = `Settings save error: ${error}`;
        render();
      });
    });

    document.addEventListener('click', (event) => {
      const target = event.target instanceof HTMLElement ? event.target.closest('[data-action], [data-section-target]') : null;
      if (!target) {
        return;
      }
      const sectionTarget = target.getAttribute('data-section-target');
      if (sectionTarget) {
        state.activeSection = sectionTarget;
        state.pendingScrollId = sectionTarget;
        render();
        return;
      }

      const action = target.getAttribute('data-action');
      if (action === 'refresh-runtime') {
        refreshRuntime().catch(() => {});
        return;
      }
      if (action === 'clear-search') {
        state.searchQuery = '';
        render();
      }
    });

    window.addEventListener('hashchange', () => {
      const sectionId = sectionIdFromHash(window.location.hash);
      if (!sectionId) {
        return;
      }
      state.activeSection = sectionId;
      state.pendingScrollId = sectionId;
      render();
    });

    window.addEventListener('resize', () => {
      render();
    });

    async function initialize() {
      const initialSection = sectionIdFromHash(window.location.hash);
      if (initialSection) {
        state.activeSection = initialSection;
        state.pendingScrollId = initialSection;
      }
      render();
      await loadSettings();
      render();
      await refreshRuntime();
      window.setInterval(() => {
        refreshRuntime().catch(() => {});
      }, 5000);
    }

    initialize().catch((error) => {
      state.runtimeError = `Settings bootstrap error: ${error}`;
      render();
    });
  </script>
</body>
</html>
