; Smart Platform / ESP32 firmware
; Это только стартовый каркас для новой платформы.
; Полной рабочей прошивки здесь пока нет.

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
board_build.filesystem = littlefs
monitor_speed = 115200
upload_speed = 921600
build_flags =
  -D SMART_PLATFORM_NODE_ID=\"esp32-main\"
  -D SMART_PLATFORM_PEER_ID=\"rpi-turret\"
  -D SMART_PLATFORM_UI_VERSION=\"0.1.0\"
  -D SMART_PLATFORM_PEER_TIMEOUT_MS=5000UL
  -D SMART_PLATFORM_AP_SSID=\"SmartPlatform-ESP32\"
  -D SMART_PLATFORM_AP_PASSWORD=\"smartplat\"
  -D SMART_PLATFORM_SD_ENABLED=1
  -D SMART_PLATFORM_SD_CS_PIN=5

