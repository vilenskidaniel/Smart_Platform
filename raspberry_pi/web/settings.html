<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Smart Platform / Settings</title>
  <style>
    :root {
      --bg: #dce5dd;
      --panel: rgba(251, 252, 248, 0.92);
      --panel-strong: #f9fcf6;
      --panel-soft: rgba(255, 255, 255, 0.62);
      --panel-glass: rgba(249, 252, 246, 0.76);
      --ink: #1a2620;
      --muted: #657469;
      --line: rgba(52, 79, 61, 0.14);
      --line-strong: rgba(52, 79, 61, 0.24);
      --accent: #2f5d43;
      --accent-soft: rgba(47, 93, 67, 0.12);
      --accent-strong: #214331;
      --hero-a: rgba(30, 61, 43, 0.98);
      --hero-b: rgba(71, 108, 79, 0.96);
      --hero-c: rgba(168, 193, 145, 0.52);
      --hero-ink: #f3fbf2;
      --ok: #2f7d4d;
      --ok-soft: rgba(47, 125, 77, 0.14);
      --warn: #9b6619;
      --warn-soft: rgba(155, 102, 25, 0.14);
      --fault: #a43a3a;
      --fault-soft: rgba(164, 58, 58, 0.14);
      --shadow: 0 24px 54px rgba(21, 33, 25, 0.12);
      --radius: 14px;
      --radius-sm: 10px;
      --display: "Bahnschrift SemiCondensed", "Arial Narrow", "Trebuchet MS", sans-serif;
      --sans: "Segoe UI Variable Text", "Segoe UI", "Trebuchet MS", sans-serif;
      --mono: "Consolas", "SFMono-Regular", monospace;
      --page-gap: 18px;
      --section-pad: 20px;
      --shell-safe-top: calc(var(--smart-platform-bar-height, 56px) + 18px);
    }

    body[data-theme="dawn"] {
      --bg: #e7ddd1;
      --panel: rgba(255, 249, 239, 0.92);
      --panel-strong: #fffbf3;
      --panel-soft: rgba(255, 248, 236, 0.7);
      --panel-glass: rgba(255, 250, 241, 0.82);
      --ink: #302217;
      --muted: #7c6956;
      --line: rgba(120, 86, 54, 0.15);
      --line-strong: rgba(120, 86, 54, 0.25);
      --accent: #8b5d2b;
      --accent-soft: rgba(139, 93, 43, 0.12);
      --accent-strong: #6e451e;
      --hero-a: rgba(98, 60, 24, 0.98);
      --hero-b: rgba(153, 105, 52, 0.96);
      --hero-c: rgba(224, 188, 126, 0.46);
      --hero-ink: #fff8ef;
      --ok: #68843b;
      --ok-soft: rgba(104, 132, 59, 0.14);
      --warn: #9d6418;
      --warn-soft: rgba(157, 100, 24, 0.14);
      --fault: #a24239;
      --fault-soft: rgba(162, 66, 57, 0.14);
      --shadow: 0 24px 54px rgba(60, 37, 17, 0.12);
    }

    body[data-theme="studio"] {
      --bg: #dce2e7;
      --panel: rgba(248, 251, 253, 0.92);
      --panel-strong: #fcfdfe;
      --panel-soft: rgba(255, 255, 255, 0.68);
      --panel-glass: rgba(248, 251, 253, 0.82);
      --ink: #18232a;
      --muted: #62717a;
      --line: rgba(57, 84, 103, 0.15);
      --line-strong: rgba(57, 84, 103, 0.24);
      --accent: #31546b;
      --accent-soft: rgba(49, 84, 107, 0.12);
      --accent-strong: #213b4c;
      --hero-a: rgba(25, 48, 61, 0.98);
      --hero-b: rgba(68, 97, 118, 0.96);
      --hero-c: rgba(158, 184, 198, 0.48);
      --hero-ink: #f5fbfe;
      --ok: #326f60;
      --ok-soft: rgba(50, 111, 96, 0.14);
      --warn: #93662b;
      --warn-soft: rgba(147, 102, 43, 0.14);
      --fault: #9c4141;
      --fault-soft: rgba(156, 65, 65, 0.14);
      --shadow: 0 24px 54px rgba(18, 34, 43, 0.12);
    }

    body[data-theme="midnight"] {
      --bg: #101820;
      --panel: rgba(24, 35, 43, 0.92);
      --panel-strong: #16212a;
      --panel-soft: rgba(33, 47, 58, 0.76);
      --panel-glass: rgba(22, 33, 42, 0.86);
      --ink: #edf6f8;
      --muted: #9fb2b9;
      --line: rgba(160, 190, 198, 0.16);
      --line-strong: rgba(160, 190, 198, 0.28);
      --accent: #6eb6c5;
      --accent-soft: rgba(110, 182, 197, 0.14);
      --accent-strong: #9ad9e5;
      --hero-a: rgba(14, 25, 34, 0.98);
      --hero-b: rgba(34, 66, 78, 0.96);
      --hero-c: rgba(67, 130, 151, 0.42);
      --hero-ink: #f4fbfd;
      --ok: #7ad7a3;
      --ok-soft: rgba(122, 215, 163, 0.14);
      --warn: #f1c16f;
      --warn-soft: rgba(241, 193, 111, 0.15);
      --fault: #f28b82;
      --fault-soft: rgba(242, 139, 130, 0.16);
      --shadow: 0 24px 54px rgba(3, 9, 13, 0.34);
    }

    body[data-theme="sunlit"] {
      --bg: #f1e7bf;
      --panel: rgba(255, 253, 238, 0.92);
      --panel-strong: #fff9df;
      --panel-soft: rgba(255, 246, 211, 0.78);
      --panel-glass: rgba(255, 249, 225, 0.84);
      --ink: #2b2a18;
      --muted: #7d744e;
      --line: rgba(143, 122, 46, 0.18);
      --line-strong: rgba(143, 122, 46, 0.28);
      --accent: #9b7a16;
      --accent-soft: rgba(155, 122, 22, 0.13);
      --accent-strong: #6f560d;
      --hero-a: rgba(116, 89, 13, 0.98);
      --hero-b: rgba(191, 148, 37, 0.95);
      --hero-c: rgba(248, 213, 94, 0.5);
      --hero-ink: #fffbe8;
      --ok: #597d2f;
      --ok-soft: rgba(89, 125, 47, 0.14);
      --warn: #a96712;
      --warn-soft: rgba(169, 103, 18, 0.15);
      --fault: #a13e32;
      --fault-soft: rgba(161, 62, 50, 0.15);
      --shadow: 0 24px 54px rgba(75, 58, 12, 0.13);
    }

    body[data-theme="night"] {
      --bg: #17171d;
      --panel: rgba(31, 31, 40, 0.92);
      --panel-strong: #20212b;
      --panel-soft: rgba(39, 40, 52, 0.76);
      --panel-glass: rgba(31, 32, 42, 0.86);
      --ink: #f2f0ea;
      --muted: #aaa7bd;
      --line: rgba(186, 181, 208, 0.15);
      --line-strong: rgba(186, 181, 208, 0.27);
      --accent: #b8a7ff;
      --accent-soft: rgba(184, 167, 255, 0.13);
      --accent-strong: #d6ccff;
      --hero-a: rgba(28, 25, 43, 0.98);
      --hero-b: rgba(67, 57, 103, 0.96);
      --hero-c: rgba(122, 105, 199, 0.42);
      --hero-ink: #fbf9ff;
      --ok: #8fd49c;
      --ok-soft: rgba(143, 212, 156, 0.14);
      --warn: #e7bd74;
      --warn-soft: rgba(231, 189, 116, 0.15);
      --fault: #ec8d9a;
      --fault-soft: rgba(236, 141, 154, 0.16);
      --shadow: 0 24px 54px rgba(5, 5, 10, 0.35);
    }

    body[data-theme="minimal"] {
      --bg: #eeeeea;
      --panel: rgba(252, 252, 248, 0.94);
      --panel-strong: #ffffff;
      --panel-soft: rgba(246, 246, 240, 0.84);
      --panel-glass: rgba(252, 252, 248, 0.86);
      --ink: #20231f;
      --muted: #6c7068;
      --line: rgba(65, 69, 62, 0.14);
      --line-strong: rgba(65, 69, 62, 0.24);
      --accent: #4b5a4b;
      --accent-soft: rgba(75, 90, 75, 0.1);
      --accent-strong: #303b31;
      --hero-a: rgba(54, 61, 55, 0.98);
      --hero-b: rgba(91, 101, 90, 0.94);
      --hero-c: rgba(170, 176, 166, 0.36);
      --hero-ink: #fbfbf8;
      --ok: #3f7352;
      --ok-soft: rgba(63, 115, 82, 0.12);
      --warn: #8c6b28;
      --warn-soft: rgba(140, 107, 40, 0.12);
      --fault: #944340;
      --fault-soft: rgba(148, 67, 64, 0.13);
      --shadow: 0 18px 42px rgba(28, 30, 28, 0.08);
    }

    body[data-theme="contrast"] {
      --bg: #ffffff;
      --panel: #ffffff;
      --panel-strong: #ffffff;
      --panel-soft: #f2f2f2;
      --panel-glass: #ffffff;
      --ink: #000000;
      --muted: #343434;
      --line: rgba(0, 0, 0, 0.24);
      --line-strong: rgba(0, 0, 0, 0.42);
      --accent: #003f8f;
      --accent-soft: rgba(0, 63, 143, 0.12);
      --accent-strong: #002b63;
      --hero-a: #000000;
      --hero-b: #1d1d1d;
      --hero-c: rgba(0, 63, 143, 0.25);
      --hero-ink: #ffffff;
      --ok: #006b2d;
      --ok-soft: rgba(0, 107, 45, 0.12);
      --warn: #8a5200;
      --warn-soft: rgba(138, 82, 0, 0.13);
      --fault: #b00020;
      --fault-soft: rgba(176, 0, 32, 0.12);
      --shadow: 0 14px 28px rgba(0, 0, 0, 0.12);
    }

    body[data-density="compact"] {
      --page-gap: 10px;
      --section-pad: 12px;
      --radius: 10px;
      --radius-sm: 8px;
    }

    * { box-sizing: border-box; }

    html {
      scroll-behavior: smooth;
      height: 100%;
      overflow: hidden;
    }

    body {
      margin: 0;
      height: 100vh;
      font-family: var(--sans);
      color: var(--ink);
      background:
        radial-gradient(circle at top left, color-mix(in srgb, var(--hero-c) 74%, transparent), transparent 34%),
        radial-gradient(circle at right center, color-mix(in srgb, var(--accent-soft) 58%, transparent), transparent 28%),
        linear-gradient(180deg, color-mix(in srgb, var(--panel-strong) 68%, white) 0%, var(--bg) 100%);
      transition: background 180ms ease, color 180ms ease;
      overflow: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.06) 1px, transparent 1px);
      background-size: 22px 22px;
      mask-image: linear-gradient(180deg, rgba(0, 0, 0, 0.2), transparent 74%);
      opacity: 0.26;
    }

    a { color: inherit; }

    button,
    input {
      font: inherit;
    }

    .page {
      position: relative;
      z-index: 1;
      max-width: 1460px;
      margin: 0 auto;
      height: 100vh;
      padding: var(--shell-safe-top) 18px 18px;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      gap: var(--page-gap);
    }

    .card {
      background: var(--panel-glass);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
    }

    .hero {
      padding: 0 2px;
      background: transparent;
      border: 0;
      box-shadow: none;
      backdrop-filter: none;
      color: var(--ink);
    }

    .hero-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      align-items: flex-start;
    }

    .hero-copy {
      max-width: 980px;
      display: grid;
      gap: 4px;
    }

    .hero-kicker,
    .section-kicker,
    .panel-kicker,
    .metric-kicker,
    .rail-kicker {
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--accent);
    }

    .hero-kicker,
    .section-kicker,
    .panel-kicker,
    .metric-kicker,
    .rail-kicker {
      display: none;
    }

    .hero h1,
    .section-title,
    .rail-title,
    .panel-title {
      margin: 0;
      font-family: var(--display);
      letter-spacing: -0.03em;
    }

    .hero h1 {
      font-size: clamp(30px, 3vw, 42px);
      line-height: 1;
    }

    .hero p,
    .section-copy,
    .section-note,
    .muted,
    .rail-copy,
    .detail-copy {
      margin: 0;
      line-height: 1.55;
      color: var(--muted);
    }

    .hero-actions,
    .chip-row,
    .option-row,
    .action-row,
    .rail-actions,
    .status-row,
    .button-row,
    .path-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .pill,
    .status-chip,
    .hero-link,
    .inline-chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 36px;
      padding: 8px 13px;
      border-radius: 999px;
      font-size: 13px;
      line-height: 1;
      text-decoration: none;
      border: 1px solid var(--line);
      background: var(--panel-soft);
      color: var(--muted);
    }

    .pill[data-tone="ok"],
    .status-chip[data-tone="ok"],
    .inline-chip[data-tone="ok"] {
      background: var(--ok-soft);
      color: var(--ok);
      border-color: color-mix(in srgb, var(--ok) 24%, transparent);
    }

    .pill[data-tone="warn"],
    .status-chip[data-tone="warn"],
    .inline-chip[data-tone="warn"] {
      background: var(--warn-soft);
      color: var(--warn);
      border-color: color-mix(in srgb, var(--warn) 24%, transparent);
    }

    .pill[data-tone="fault"],
    .status-chip[data-tone="fault"],
    .inline-chip[data-tone="fault"] {
      background: var(--fault-soft);
      color: var(--fault);
      border-color: color-mix(in srgb, var(--fault) 24%, transparent);
    }

    .option-row[data-layout="language"] {
      align-items: center;
    }

    .option-row[data-layout="language"] .option-chip span {
      min-width: 48px;
      justify-content: center;
    }

    .settings-shell {
      display: grid;
      grid-template-columns: 300px minmax(0, 1fr);
      gap: var(--page-gap);
      align-items: stretch;
      min-height: 0;
      height: 100%;
      overflow: hidden;
    }

    .settings-rail,
    .section-panel,
    .detail-card,
    .path-card,
    .node-card,
    .ownership-card,
    .module-card,
    .component-card,
    .service-card,
    .constructor-card,
    .note-card,
    .theme-card,
    .empty-state {
      background: linear-gradient(180deg, color-mix(in srgb, var(--panel-strong) 86%, white), color-mix(in srgb, var(--panel-strong) 92%, var(--bg)));
    }

    .settings-rail {
      position: sticky;
      top: 0;
      padding: var(--section-pad);
      display: grid;
      gap: 14px;
      min-height: 0;
      height: 100%;
      max-height: none;
      overflow: auto;
      overscroll-behavior: contain;
      scrollbar-gutter: stable;
    }

    .rail-block {
      display: grid;
      gap: 10px;
      padding: 14px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--line);
      background: var(--panel-soft);
    }

    .rail-title {
      font-size: 26px;
      line-height: 0.98;
    }

    .search-shell {
      position: relative;
    }

    .search-input {
      width: 100%;
      min-height: 48px;
      padding: 12px 14px;
      border-radius: 16px;
      border: 1px solid var(--line);
      background: color-mix(in srgb, var(--panel-strong) 82%, white);
      color: var(--ink);
      outline: none;
      transition: border-color 160ms ease, box-shadow 160ms ease, background 160ms ease;
    }

    .search-input:focus {
      border-color: color-mix(in srgb, var(--accent) 34%, transparent);
      box-shadow: 0 0 0 4px color-mix(in srgb, var(--accent) 10%, transparent);
    }

    .rail-nav {
      display: grid;
      gap: 8px;
    }

    .rail-button {
      appearance: none;
      width: 100%;
      text-align: left;
      padding: 12px 14px;
      border-radius: 18px;
      border: 1px solid var(--line);
      background: color-mix(in srgb, var(--panel-strong) 82%, white);
      color: var(--ink);
      cursor: pointer;
      display: grid;
      gap: 4px;
      transition: transform 150ms ease, border-color 150ms ease, background 150ms ease, box-shadow 150ms ease;
    }

    .rail-button:hover,
    .rail-button:focus-visible {
      transform: translateY(-1px);
      border-color: color-mix(in srgb, var(--accent) 28%, transparent);
      background: color-mix(in srgb, var(--accent) 7%, white);
      outline: none;
    }

    .rail-button[data-active="true"] {
      border-color: color-mix(in srgb, var(--accent) 36%, transparent);
      background: linear-gradient(180deg, color-mix(in srgb, var(--accent) 12%, white), color-mix(in srgb, var(--accent) 6%, white));
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.6);
    }

    .rail-button strong {
      font-size: 15px;
      line-height: 1.2;
    }

    .rail-button span {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.4;
    }

    .action-button,
    .ghost-button {
      appearance: none;
      border: 1px solid var(--line);
      background: color-mix(in srgb, var(--panel-strong) 82%, white);
      color: var(--ink);
      border-radius: 16px;
      min-height: 42px;
      padding: 10px 14px;
      text-decoration: none;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: transform 150ms ease, border-color 150ms ease, background 150ms ease;
    }

    .action-button:hover,
    .action-button:focus-visible,
    .ghost-button:hover,
    .ghost-button:focus-visible {
      transform: translateY(-1px);
      border-color: color-mix(in srgb, var(--accent) 28%, transparent);
      background: color-mix(in srgb, var(--accent) 7%, white);
      outline: none;
    }

    .action-button.is-disabled,
    .ghost-button.is-disabled {
      opacity: 0.62;
      cursor: help;
      transform: none;
      box-shadow: none;
    }

    .settings-detail {
      min-width: 0;
      display: grid;
      gap: var(--page-gap);
      min-height: 0;
      height: 100%;
      max-height: none;
      overflow: auto;
      overscroll-behavior: contain;
      padding-right: 4px;
      scrollbar-gutter: stable;
    }

    .section-panel {
      padding: var(--section-pad);
      display: grid;
      gap: 16px;
      scroll-margin-top: 12px;
    }

    .section-head {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-start;
      flex-wrap: wrap;
    }

    .section-title {
      font-size: clamp(28px, 4vw, 40px);
      line-height: 0.98;
    }

    .detail-grid,
    .path-grid,
    .node-grid,
    .ownership-grid,
    .module-grid,
    .theme-grid,
    .component-grid,
    .service-grid,
    .constructor-grid {
      display: grid;
      gap: 12px;
    }

    .detail-grid,
    .path-grid,
    .ownership-grid,
    .module-grid,
    .component-grid,
    .service-grid,
    .constructor-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .theme-grid {
      grid-template-columns: repeat(auto-fit, minmax(128px, 1fr));
    }

    .node-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .node-card[data-tone="ok"],
    .path-card[data-tone="ok"],
    .ownership-card[data-tone="ok"],
    .module-card[data-tone="ok"],
    .component-card[data-tone="ok"],
    .service-card[data-tone="ok"] {
      border-color: color-mix(in srgb, var(--ok) 22%, transparent);
    }

    .node-card[data-tone="warn"],
    .path-card[data-tone="warn"],
    .ownership-card[data-tone="warn"],
    .module-card[data-tone="warn"],
    .component-card[data-tone="warn"],
    .service-card[data-tone="warn"] {
      border-color: color-mix(in srgb, var(--warn) 22%, transparent);
    }

    .node-card[data-tone="fault"],
    .path-card[data-tone="fault"],
    .ownership-card[data-tone="fault"],
    .module-card[data-tone="fault"],
    .component-card[data-tone="fault"],
    .service-card[data-tone="fault"] {
      border-color: color-mix(in srgb, var(--fault) 22%, transparent);
    }

    .info-stack,
    .status-list,
    .module-list,
    .ownership-list,
    .note-stack,
    .diagnostics-stack {
      display: grid;
      gap: 10px;
    }

    .info-row,
    .status-row-item,
    .ownership-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
      padding-top: 10px;
      border-top: 1px solid var(--line);
      font-size: 14px;
    }

    .info-row:first-child,
    .status-row-item:first-child,
    .ownership-row:first-child {
      padding-top: 0;
      border-top: 0;
    }

    .info-row strong,
    .status-row-item strong,
    .ownership-row strong {
      color: var(--ink);
    }

    .info-row span:last-child,
    .status-row-item span:last-child,
    .ownership-row span:last-child {
      text-align: right;
      color: var(--ink);
      min-width: 0;
      max-width: 64%;
      overflow-wrap: anywhere;
      word-break: break-word;
    }

    .detail-card,
    .path-card,
    .node-card,
    .ownership-card,
    .module-card,
    .note-card,
    .empty-state {
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: 10px;
      display: grid;
      gap: 12px;
    }

    .panel-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      align-items: flex-start;
    }

    .panel-title {
      font-size: 20px;
      line-height: 1.04;
      letter-spacing: 0;
    }

    .toggle {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 14px;
      align-items: center;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: var(--panel-soft);
    }

    .toggle.is-disabled {
      opacity: 0.72;
      cursor: help;
    }

    .toggle-copy {
      display: grid;
      gap: 2px;
    }

    .toggle-copy strong {
      font-size: 14px;
      line-height: 1.3;
    }

    .toggle-copy span {
      display: none;
    }

    .switch {
      appearance: none;
      position: relative;
      width: 52px;
      height: 30px;
      margin: 0;
      border-radius: 999px;
      border: 1px solid var(--line-strong);
      background: rgba(120, 132, 122, 0.18);
      cursor: pointer;
      transition: background 160ms ease, border-color 160ms ease;
    }

    .switch::after {
      content: "";
      position: absolute;
      top: 3px;
      left: 3px;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: #ffffff;
      box-shadow: 0 3px 8px rgba(18, 28, 21, 0.18);
      transition: transform 160ms ease;
    }

    .switch:checked {
      background: var(--accent);
      border-color: color-mix(in srgb, var(--accent) 70%, #ffffff);
    }

    .switch:checked::after {
      transform: translateX(22px);
    }

    .switch:disabled {
      cursor: not-allowed;
    }

    .option-chip,
    .theme-option {
      position: relative;
      display: inline-flex;
    }

    .option-chip input,
    .theme-option input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .option-chip span {
      min-height: 38px;
      padding: 9px 13px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: color-mix(in srgb, var(--panel-strong) 84%, white);
      color: var(--muted);
      font-size: 13px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      transition: border-color 160ms ease, background 160ms ease, color 160ms ease;
    }

    .option-chip input:checked + span {
      color: var(--accent);
      border-color: color-mix(in srgb, var(--accent) 40%, transparent);
      background: color-mix(in srgb, var(--accent) 11%, white);
    }

    .theme-card {
      min-height: 116px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--line);
      padding: 13px;
      cursor: pointer;
      display: grid;
      gap: 10px;
      transition: transform 150ms ease, border-color 150ms ease, box-shadow 150ms ease;
    }

    .theme-card[data-theme-preview="meadow"] {
      background: linear-gradient(180deg, rgba(50, 93, 67, 0.18), rgba(249, 252, 246, 0.96));
    }

    .theme-card[data-theme-preview="dawn"] {
      background: linear-gradient(180deg, rgba(139, 93, 43, 0.18), rgba(255, 251, 243, 0.96));
    }

    .theme-card[data-theme-preview="studio"] {
      background: linear-gradient(180deg, rgba(49, 84, 107, 0.18), rgba(252, 253, 254, 0.96));
    }

    .theme-card[data-theme-preview="midnight"] {
      background: linear-gradient(180deg, rgba(42, 98, 116, 0.34), rgba(15, 24, 31, 0.96));
      color: #f4fbfd;
    }

    .theme-card[data-theme-preview="sunlit"] {
      background: linear-gradient(180deg, rgba(236, 191, 51, 0.3), rgba(255, 249, 225, 0.96));
    }

    .theme-card[data-theme-preview="night"] {
      background: linear-gradient(180deg, rgba(117, 99, 196, 0.34), rgba(28, 27, 37, 0.96));
      color: #fbf9ff;
    }

    .theme-card[data-theme-preview="minimal"] {
      background: linear-gradient(180deg, rgba(105, 112, 101, 0.16), rgba(252, 252, 248, 0.96));
    }

    .theme-card[data-theme-preview="contrast"] {
      background: linear-gradient(180deg, rgba(0, 63, 143, 0.16), rgba(255, 255, 255, 0.98));
    }

    .theme-card:hover,
    .theme-card:focus-within {
      transform: translateY(-2px);
      border-color: color-mix(in srgb, var(--accent) 28%, transparent);
      box-shadow: 0 14px 24px rgba(19, 31, 23, 0.08);
    }

    .theme-option input:checked + .theme-card {
      border-color: color-mix(in srgb, var(--accent) 42%, transparent);
      box-shadow: inset 0 0 0 1px color-mix(in srgb, var(--accent) 20%, transparent);
    }

    .theme-name {
      font-family: var(--display);
      font-size: 24px;
      line-height: 1;
      margin: 0;
      letter-spacing: 0;
    }

    .theme-card .detail-copy {
      display: none;
    }

    .theme-swatch-row {
      display: flex;
      gap: 8px;
    }

    .theme-swatch {
      width: 26px;
      height: 26px;
      border-radius: 999px;
      border: 1px solid rgba(0, 0, 0, 0.08);
    }

    .theme-card[data-theme-preview="meadow"] .theme-swatch:nth-child(1) { background: #274d38; }
    .theme-card[data-theme-preview="meadow"] .theme-swatch:nth-child(2) { background: #588062; }
    .theme-card[data-theme-preview="meadow"] .theme-swatch:nth-child(3) { background: #dce5dd; }
    .theme-card[data-theme-preview="dawn"] .theme-swatch:nth-child(1) { background: #7e4f21; }
    .theme-card[data-theme-preview="dawn"] .theme-swatch:nth-child(2) { background: #c08546; }
    .theme-card[data-theme-preview="dawn"] .theme-swatch:nth-child(3) { background: #e7ddd1; }
    .theme-card[data-theme-preview="studio"] .theme-swatch:nth-child(1) { background: #2a475d; }
    .theme-card[data-theme-preview="studio"] .theme-swatch:nth-child(2) { background: #7090a6; }
    .theme-card[data-theme-preview="studio"] .theme-swatch:nth-child(3) { background: #dce2e7; }
    .theme-card[data-theme-preview="midnight"] .theme-swatch:nth-child(1) { background: #101820; }
    .theme-card[data-theme-preview="midnight"] .theme-swatch:nth-child(2) { background: #6eb6c5; }
    .theme-card[data-theme-preview="midnight"] .theme-swatch:nth-child(3) { background: #edf6f8; }
    .theme-card[data-theme-preview="sunlit"] .theme-swatch:nth-child(1) { background: #9b7a16; }
    .theme-card[data-theme-preview="sunlit"] .theme-swatch:nth-child(2) { background: #f1c94f; }
    .theme-card[data-theme-preview="sunlit"] .theme-swatch:nth-child(3) { background: #fff9df; }
    .theme-card[data-theme-preview="night"] .theme-swatch:nth-child(1) { background: #17171d; }
    .theme-card[data-theme-preview="night"] .theme-swatch:nth-child(2) { background: #b8a7ff; }
    .theme-card[data-theme-preview="night"] .theme-swatch:nth-child(3) { background: #f2f0ea; }
    .theme-card[data-theme-preview="minimal"] .theme-swatch:nth-child(1) { background: #20231f; }
    .theme-card[data-theme-preview="minimal"] .theme-swatch:nth-child(2) { background: #a9afa7; }
    .theme-card[data-theme-preview="minimal"] .theme-swatch:nth-child(3) { background: #ffffff; }
    .theme-card[data-theme-preview="contrast"] .theme-swatch:nth-child(1) { background: #000000; }
    .theme-card[data-theme-preview="contrast"] .theme-swatch:nth-child(2) { background: #003f8f; }
    .theme-card[data-theme-preview="contrast"] .theme-swatch:nth-child(3) { background: #ffffff; }

    body[data-density="compact"] .section-title {
      font-size: clamp(23px, 3vw, 32px);
    }

    body[data-density="compact"] .panel-title,
    body[data-density="compact"] .theme-name {
      font-size: 20px;
    }

    body[data-density="compact"] .detail-card,
    body[data-density="compact"] .section-panel,
    body[data-density="compact"] .path-card,
    body[data-density="compact"] .node-card,
    body[data-density="compact"] .ownership-card,
    body[data-density="compact"] .module-card,
    body[data-density="compact"] .component-card,
    body[data-density="compact"] .service-card {
      padding: 12px;
    }

    body[data-density="compact"] .toggle,
    body[data-density="compact"] .readonly-row,
    body[data-density="compact"] .note-box {
      padding: 10px 12px;
      border-radius: var(--radius-sm);
    }

    body[data-density="compact"] .theme-card {
      min-height: 92px;
      padding: 10px;
    }

    .path-value,
    .mono-value,
    .code-block {
      font-family: var(--mono);
    }

    .path-value {
      color: var(--ink);
      font-size: 13px;
      line-height: 1.55;
      overflow-wrap: anywhere;
    }

    .module-pill-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .module-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 34px;
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: var(--panel-soft);
      color: var(--ink);
      font-size: 13px;
    }

    .note-box {
      padding: 12px 14px;
      border-radius: 18px;
      border: 1px dashed color-mix(in srgb, var(--line-strong) 82%, transparent);
      background: color-mix(in srgb, var(--panel-soft) 78%, white);
      color: var(--muted);
      line-height: 1.5;
      font-size: 14px;
    }

    .readonly-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: var(--panel-soft);
      color: var(--ink);
      font-size: 14px;
    }

    .readonly-row strong {
      display: block;
      margin-bottom: 4px;
    }

    .field-grid {
      display: grid;
      gap: 10px;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    }

    .field {
      display: grid;
      gap: 6px;
    }

    .field label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .field input,
    .field select,
    .field textarea {
      width: 100%;
      min-height: 38px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--line);
      background: color-mix(in srgb, var(--panel-strong) 84%, white);
      color: var(--ink);
      font: inherit;
      padding: 9px 11px;
    }

    .field textarea {
      min-height: 86px;
      resize: vertical;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: grid;
      place-items: center;
      padding: 18px;
      background: rgba(13, 23, 17, 0.38);
      backdrop-filter: blur(8px);
    }

    .modal {
      width: min(760px, 100%);
      max-height: min(88vh, 760px);
      overflow: auto;
      border-radius: var(--radius);
      border: 1px solid var(--line);
      background: var(--panel-strong);
      box-shadow: 0 34px 70px rgba(8, 18, 12, 0.28);
      padding: 18px;
      display: grid;
      gap: 14px;
    }

    .step-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .step-pill {
      border-radius: 999px;
      padding: 7px 10px;
      border: 1px solid var(--line);
      color: var(--muted);
      font-size: 12px;
    }

    .step-pill[data-active="true"] {
      color: var(--accent);
      border-color: color-mix(in srgb, var(--accent) 36%, transparent);
      background: color-mix(in srgb, var(--accent) 10%, white);
    }

    .empty-state {
      padding: 22px;
    }

    .empty-state h2 {
      margin: 0 0 8px;
      font-size: 28px;
    }

    .diagnostics-details {
      display: grid;
      gap: 12px;
    }

    .diagnostics-details > summary {
      cursor: pointer;
      font-weight: 700;
      color: var(--ink);
      list-style-position: inside;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--panel-soft);
    }

    .diagnostics-details[open] > summary {
      margin-bottom: 12px;
    }

    .toast-stack {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 80;
      display: grid;
      gap: 10px;
      max-width: min(92vw, 340px);
    }

    .toast {
      border-radius: 18px;
      border: 1px solid var(--line);
      background: color-mix(in srgb, var(--panel-strong) 92%, white);
      box-shadow: 0 20px 38px rgba(18, 30, 22, 0.14);
      padding: 14px 16px;
      display: grid;
      gap: 4px;
    }

    .toast[data-tone="ok"] {
      border-color: color-mix(in srgb, var(--ok) 22%, transparent);
    }

    .toast[data-tone="warn"] {
      border-color: color-mix(in srgb, var(--warn) 22%, transparent);
    }

    .toast[data-tone="fault"] {
      border-color: color-mix(in srgb, var(--fault) 22%, transparent);
    }

    .code-block {
      margin: 0;
      padding: 14px;
      border-radius: 18px;
      background: #17221a;
      color: #e8f5e8;
      overflow: auto;
      font-size: 12px;
      line-height: 1.55;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .sp-tooltip {
      position: fixed;
      z-index: 90;
      max-width: min(360px, calc(100vw - 24px));
      padding: 12px 14px;
      border-radius: 18px;
      border: 1px solid rgba(45, 93, 67, 0.14);
      background: rgba(250, 252, 248, 0.98);
      color: var(--ink);
      box-shadow: 0 18px 34px rgba(19, 31, 23, 0.14);
      backdrop-filter: blur(14px);
      opacity: 0;
      transform: translateY(6px);
      pointer-events: none;
      transition: opacity 140ms ease, transform 140ms ease;
    }

    .sp-tooltip[data-visible="true"] {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    .sp-tooltip-title {
      display: block;
      font-weight: 700;
      line-height: 1.25;
    }

    .sp-tooltip-subtitle {
      display: block;
      margin-top: 2px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }

    .sp-tooltip-description {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .sp-tooltip-body {
      display: grid;
      gap: 10px;
      margin-top: 8px;
    }

    .sp-tooltip-section {
      display: grid;
      gap: 6px;
    }

    .sp-tooltip-section-title {
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
    }

    .sp-tooltip-table {
      display: grid;
      gap: 6px;
    }

    .sp-tooltip-row {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      font-size: 12px;
      line-height: 1.45;
    }

    .sp-tooltip-row-label {
      color: var(--muted);
    }

    .sp-tooltip-row-value {
      text-align: right;
      max-width: 58%;
      overflow-wrap: anywhere;
    }

    @media (max-width: 1100px) {
      .settings-shell {
        grid-template-columns: 1fr;
        grid-template-rows: auto minmax(0, 1fr);
      }

      .settings-rail {
        position: static;
        height: auto;
        max-height: min(34vh, 330px);
      }

      .settings-detail {
        height: 100%;
        max-height: none;
      }
    }

    @media (max-width: 860px) {
      .detail-grid,
      .path-grid,
      .node-grid,
      .ownership-grid,
      .module-grid,
      .component-grid,
      .service-grid,
      .constructor-grid {
        grid-template-columns: 1fr;
      }

      .theme-grid {
        grid-template-columns: repeat(auto-fit, minmax(118px, 1fr));
      }
    }

    @media (max-width: 760px) {
      .page {
        padding-inline: 12px;
      }

      .section-head,
      .hero-head,
      .panel-head {
        align-items: stretch;
      }

      .info-row,
      .status-row-item,
      .ownership-row,
      .readonly-row {
        flex-direction: column;
      }

      .info-row span:last-child,
      .status-row-item span:last-child,
      .ownership-row span:last-child {
        max-width: none;
        text-align: left;
      }
    }
  </style>
</head>

    const THEME_OPTIONS = [

    ];

    function esc(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function readStorage(key) {
      try {
        return window.localStorage.getItem(key);
      } catch (_error) {
        return null;
      }
    }

    function writeStorage(key, value) {
      try {
        window.localStorage.setItem(key, value);
      } catch (_error) {
        return;
      }
    }

    function clone(value) {
      return JSON.parse(JSON.stringify(value));
    }

    function boolValue(value, fallback) {
      if (typeof value === "boolean") {
        return value;
      }
      if (typeof value === "string") {
        return ["1", "true", "yes", "on"].includes(value.trim().toLowerCase());
      }
      return fallback;
    }

    function choiceValue(value, allowed, fallback) {
      const normalized = String(value ?? "").trim().toLowerCase();
      return allowed.includes(normalized) ? normalized : fallback;
    }

    function numberValue(value, fallback) {
      const parsed = Number(value);
      return Number.isFinite(parsed) ? parsed : fallback;
    }

    function normalizeSettings(raw) {
      const payload = raw && typeof raw === "object" ? raw : {};
      const interfaceSettings = payload.interface && typeof payload.interface === "object" ? payload.interface : {};
      const styleSettings = payload.style && typeof payload.style === "object" ? payload.style : {};
      const syncSettings = payload.synchronization && typeof payload.synchronization === "object" ? payload.synchronization : {};
      const keyboardSettings = payload.keyboard && typeof payload.keyboard === "object" ? payload.keyboard : {};
      const keyboardBindings = keyboardSettings.bindings && typeof keyboardSettings.bindings === "object" ? keyboardSettings.bindings : {};
      const turretPolicies = payload.turret_policies && typeof payload.turret_policies === "object" ? payload.turret_policies : {};
      const irrigationSettings = payload.irrigation && typeof payload.irrigation === "object" ? payload.irrigation : {};
      const languages = ["en", "ru", "he", "de", "fr", "es", "zh", "ar"];
      const themes = ["meadow", "dawn", "studio", "midnight", "sunlit", "night", "minimal", "contrast"];

      return {
        schema_version: "settings.v1",
        updated_at_ms: numberValue(payload.updated_at_ms, 0),
        interface: {
          language: choiceValue(interfaceSettings.language, languages, "en"),
          desktop_controls_enabled: boolValue(interfaceSettings.desktop_controls_enabled, true),
          fullscreen_enabled: boolValue(interfaceSettings.fullscreen_enabled, false),
          show_advanced_diagnostics: boolValue(interfaceSettings.show_advanced_diagnostics, false)
        },
        style: {
          theme: choiceValue(styleSettings.theme, themes, "meadow"),
          density: choiceValue(styleSettings.density, ["comfortable", "compact"], "comfortable")
        },
        synchronization: {
          preferred_mode: choiceValue(syncSettings.preferred_mode, ["auto", "manual_review"], "auto"),
          prefer_peer_continuity: boolValue(syncSettings.prefer_peer_continuity, true)
        },
        keyboard: {
          turret_manual_enabled: boolValue(keyboardSettings.turret_manual_enabled, true),
          base_power_percent: Math.max(1, Math.min(100, numberValue(keyboardSettings.base_power_percent, 50))),
          shift_power_percent: Math.max(1, Math.min(100, numberValue(keyboardSettings.shift_power_percent, 100))),
          bindings: {
            aim_up: String(keyboardBindings.aim_up || "ArrowUp"),
            aim_down: String(keyboardBindings.aim_down || "ArrowDown"),
            aim_left: String(keyboardBindings.aim_left || "ArrowLeft"),
            aim_right: String(keyboardBindings.aim_right || "ArrowRight"),
            irrigation_zone_1: String(keyboardBindings.irrigation_zone_1 || "Digit1"),
            irrigation_zone_2: String(keyboardBindings.irrigation_zone_2 || "Digit2"),
            irrigation_zone_3: String(keyboardBindings.irrigation_zone_3 || "Digit3"),
            irrigation_zone_4: String(keyboardBindings.irrigation_zone_4 || "Digit4"),
            irrigation_zone_5: String(keyboardBindings.irrigation_zone_5 || "Digit5"),
            piezo: String(keyboardBindings.piezo || "KeyQ"),
            strobe: String(keyboardBindings.strobe || "KeyW"),
            water: String(keyboardBindings.water || "KeyE"),
            capture: String(keyboardBindings.capture || "Space"),
            power_modifier: String(keyboardBindings.power_modifier || "Shift")
          }
        },
        turret_policies: {
          silent_observation: boolValue(turretPolicies.silent_observation, true),
          allow_animal_deterrence: boolValue(turretPolicies.allow_animal_deterrence, true),
          allow_auto_water_action: boolValue(turretPolicies.allow_auto_water_action, false),
          return_to_warm_standby: boolValue(turretPolicies.return_to_warm_standby, true),
          do_not_target_people: true
        },
        irrigation: {
          prefer_driest_zone: boolValue(irrigationSettings.prefer_driest_zone, true),
          block_automatic_during_service: boolValue(irrigationSettings.block_automatic_during_service, true),
          require_sensor_health: boolValue(irrigationSettings.require_sensor_health, true)
        }
      };
    }

    function t(key) {
      const language = (state.settings && state.settings.interface && state.settings.interface.language) || "en";
      const dictionary = COPY[language] || COPY.en;
      return dictionary[key] || COPY.en[key] || key;
    }

    function tooltipPayload(title, description, sections, subtitle) {
      return {
        title: String(title || "").trim(),
        description: String(description || "").trim(),
        subtitle: String(subtitle || "").trim(),
        sections: Array.isArray(sections) ? sections : []
      };
    }

    function tooltipAttrs(payload) {
      const encoded = encodeURIComponent(JSON.stringify(payload || {}));
      return ` data-tooltip-payload="${esc(encoded)}"`;
    }

    function tooltipOwnerId(target) {
      if (!(target instanceof HTMLElement)) {
        return "";
      }
      return target.getAttribute("data-tooltip-owner")
        || target.getAttribute("data-action")
        || target.getAttribute("data-section-target")
        || target.getAttribute("id")
        || "";
    }

    function ensureTooltip() {
      return document.getElementById("settings-tooltip");
    }

    function readTooltipPayload(target) {
      if (!(target instanceof HTMLElement)) {
        return null;
      }
      const encoded = target.getAttribute("data-tooltip-payload") || "";
      if (!encoded) {
        return null;
      }
      try {
        return JSON.parse(decodeURIComponent(encoded));
      } catch (_error) {
        return null;
      }
    }

    function renderTooltipMarkup(payload) {
      const sections = Array.isArray(payload.sections) ? payload.sections : [];
      const description = payload.description
        ? `<p class="sp-tooltip-description">${esc(payload.description)}</p>`
        : "";
      const sectionMarkup = sections.map((section) => {
        const rows = Array.isArray(section.rows) ? section.rows : [];
        return `
          <section class="sp-tooltip-section">
            ${section.title ? `<div class="sp-tooltip-section-title">${esc(section.title)}</div>` : ""}
            <div class="sp-tooltip-table">
              ${rows.map((row) => `
                <div class="sp-tooltip-row">
                  <span class="sp-tooltip-row-label">${esc(row.label || "")}</span>
                  <span class="sp-tooltip-row-value">${esc(row.value || "")}</span>
                </div>
              `).join("")}
            </div>
          </section>
        `;
      }).join("");

      return `
        <span class="sp-tooltip-title">${esc(payload.title || "")}</span>
        ${payload.subtitle ? `<span class="sp-tooltip-subtitle">${esc(payload.subtitle)}</span>` : ""}
        <div class="sp-tooltip-body">${description}${sectionMarkup}</div>
      `;
    }

    function clearTooltipHideTimer() {
      if (!state.tooltipHideTimer) {
        return;
      }
      window.clearTimeout(state.tooltipHideTimer);
      state.tooltipHideTimer = 0;
    }

    function clearTooltipShowTimer() {
      if (!state.tooltipShowTimer) {
        return;
      }
      window.clearTimeout(state.tooltipShowTimer);
      state.tooltipShowTimer = 0;
    }

    function setTooltipPointerOrigin(event) {
      const isPointerEvent = typeof PointerEvent !== "undefined" && event instanceof PointerEvent;
      if (!(event instanceof MouseEvent || isPointerEvent)) {
        return;
      }
      state.tooltipPointerX = event.clientX;
      state.tooltipPointerY = event.clientY;
    }

    function tooltipMovedPastTolerance(event) {
      const isPointerEvent = typeof PointerEvent !== "undefined" && event instanceof PointerEvent;
      if (!(event instanceof MouseEvent || isPointerEvent)) {
        return false;
      }
      const dx = Math.abs(event.clientX - state.tooltipPointerX);
      const dy = Math.abs(event.clientY - state.tooltipPointerY);
      return Math.max(dx, dy) > TOOLTIP_MOVE_TOLERANCE_PX;
    }

    function hideTooltip(force) {
      if (state.tooltipPinned && !force) {
        return;
      }
      clearTooltipShowTimer();
      clearTooltipHideTimer();
      const tooltip = ensureTooltip();
      if (!tooltip) {
        return;
      }
      tooltip.setAttribute("data-visible", "false");
      state.tooltipOwnerId = "";
      state.tooltipHoverTarget = null;
      if (force) {
        state.tooltipPinned = false;
      }
    }

    function scheduleTooltipAutoHide() {
      clearTooltipHideTimer();
      const ownerId = state.tooltipOwnerId;
      state.tooltipHideTimer = window.setTimeout(() => {
        if (state.tooltipOwnerId === ownerId) {
          hideTooltip(true);
        }
      }, TOOLTIP_HIDE_MS);
    }

    function showTooltip(target, pinned) {
      const payload = readTooltipPayload(target);
      const tooltip = ensureTooltip();
      if (!payload || !tooltip || !(target instanceof HTMLElement)) {
        return;
      }

      const rect = target.getBoundingClientRect();
      tooltip.innerHTML = renderTooltipMarkup(payload);
      tooltip.setAttribute("data-visible", "true");
      state.tooltipOwnerId = tooltipOwnerId(target);
      state.tooltipPinned = Boolean(pinned);
      scheduleTooltipAutoHide();

      window.requestAnimationFrame(() => {
        const tipRect = tooltip.getBoundingClientRect();
        const left = Math.min(
          Math.max(12, rect.left + (rect.width / 2) - (tipRect.width / 2)),
          window.innerWidth - tipRect.width - 12
        );
        const showAbove = rect.bottom + tipRect.height + 16 > window.innerHeight;
        const top = showAbove ? rect.top - tipRect.height - 8 : rect.bottom + 8;
        tooltip.style.left = `${left}px`;
        tooltip.style.top = `${Math.max(12, top)}px`;
      });
    }

    function scheduleTooltipShow(target, pinned, event) {
      if (!(target instanceof HTMLElement)) {
        return;
      }
      if (state.tooltipPinned && !pinned) {
        return;
      }
      if (state.tooltipHoverTarget === target && state.tooltipShowTimer) {
        return;
      }
      clearTooltipShowTimer();
      setTooltipPointerOrigin(event);
      state.tooltipHoverTarget = target;
      state.tooltipShowTimer = window.setTimeout(() => {
        state.tooltipShowTimer = 0;
        if (state.tooltipHoverTarget === target) {
          showTooltip(target, pinned);
        }
      }, pinned ? 0 : TOOLTIP_SHOW_DELAY_MS);
    }

    function closestTooltipTarget(node) {
      return node instanceof HTMLElement ? node.closest("[data-tooltip-payload]") : null;
    }

    function bindTooltipEvents() {
      document.addEventListener("mouseover", (event) => {
        const target = closestTooltipTarget(event.target);
        if (!target) {
          return;
        }
        scheduleTooltipShow(target, false, event);
      });

      document.addEventListener("mousemove", (event) => {
        if (!state.tooltipHoverTarget || state.tooltipPinned) {
          return;
        }
        if (tooltipMovedPastTolerance(event)) {
          hideTooltip(true);
        }
      });

      document.addEventListener("mouseout", (event) => {
        const target = closestTooltipTarget(event.target);
        if (!target) {
          return;
        }
        const related = event.relatedTarget;
        if (related instanceof HTMLElement && (target.contains(related) || related.closest(".sp-tooltip"))) {
          return;
        }
        hideTooltip(false);
      });

      document.addEventListener("focusin", (event) => {
        const target = closestTooltipTarget(event.target);
        if (target) {
          showTooltip(target, false);
        }
      });

      document.addEventListener("focusout", (event) => {
        const related = event.relatedTarget;
        if (related instanceof HTMLElement && related.closest(".sp-tooltip")) {
          return;
        }
        hideTooltip(false);
      });

      document.addEventListener("click", (event) => {
        const target = closestTooltipTarget(event.target);
        if (target) {
          const targetOwner = tooltipOwnerId(target);
          if (state.tooltipPinned && state.tooltipOwnerId === targetOwner) {
            hideTooltip(true);
            return;
          }
          setTooltipPointerOrigin(event);
          showTooltip(target, true);
          return;
        }

        if (!(event.target instanceof HTMLElement) || !event.target.closest(".sp-tooltip")) {
          hideTooltip(true);
        }
      });
    }

    function setDeepValue(target, path, value) {
      const segments = path.split(".");
      let cursor = target;
      while (segments.length > 1) {
        const segment = segments.shift();
        if (!cursor[segment] || typeof cursor[segment] !== "object") {
          cursor[segment] = {};
        }
        cursor = cursor[segment];
      }
      cursor[segments[0]] = value;
    }

    function applyVisualSettings() {
      document.body.dataset.theme = state.settings.style.theme;
      document.body.dataset.density = state.settings.style.density;
      document.documentElement.lang = state.settings.interface.language;
      document.documentElement.dir = ["he", "ar"].includes(state.settings.interface.language) ? "rtl" : "ltr";
      document.title = `Smart Platform / ${t("pageTitle")}`;
      writeStorage(DESKTOP_CONTROLS_KEY, state.settings.interface.desktop_controls_enabled ? "1" : "0");
      writeStorage(FULLSCREEN_STORAGE_KEY, state.settings.interface.fullscreen_enabled ? "1" : "0");
      writeStorage(SETTINGS_LANGUAGE_KEY, state.settings.interface.language);
    }

    function broadcastSettingsUpdate() {
      try {
        window.dispatchEvent(new CustomEvent("smart-platform:settings-updated", {
          detail: clone(state.settings)
        }));
      } catch (_error) {
        return;
      }
    }

    async function applyFullscreenMode(enabled) {
      writeStorage(FULLSCREEN_STORAGE_KEY, enabled ? "1" : "0");
      try {
        if (enabled && !document.fullscreenElement && document.fullscreenEnabled && document.documentElement.requestFullscreen) {
          await document.documentElement.requestFullscreen();
        }
        if (!enabled && document.fullscreenElement && document.exitFullscreen) {
          await document.exitFullscreen();
        }
      } catch (_error) {
        return Boolean(document.fullscreenElement);
      }
      return Boolean(document.fullscreenElement);
    }

    async function fetchJson(url, options) {
      const response = await fetch(url, Object.assign({ cache: "no-store" }, options || {}));
      if (!response.ok) {
        throw new Error(`${response.status} ${response.statusText}`.trim());
      }
      return response.json();
    }

    async function loadSettings() {
      try {
        const payload = await fetchJson("/api/v1/settings");
        state.settings = normalizeSettings(payload);
        state.settingsStorage = "server";
        state.saveMessage = "";
      } catch (_error) {
        const raw = readStorage(SETTINGS_FALLBACK_KEY);
        if (raw) {
          try {
            state.settings = normalizeSettings(JSON.parse(raw));
          } catch (_parseError) {
            state.settings = normalizeSettings(DEFAULT_SETTINGS);
          }
        }
        state.settingsStorage = "browser";
      }
      applyVisualSettings();
      broadcastSettingsUpdate();
    }

    function showToast(title, body, tone) {
      const toastStack = document.getElementById("toast-stack");
      if (!toastStack) {
        return;
      }
      toastStack.innerHTML = `
        <div class="toast" data-tone="${esc(tone || "ok")}">
          <strong>${esc(title)}</strong>
          <div>${esc(body)}</div>
        </div>
      `;
      window.clearTimeout(state.toastTimer);
      state.toastTimer = window.setTimeout(() => {
        toastStack.innerHTML = "";
      }, 2600);
    }

    async function saveSettings(nextSettings) {
      state.saveState = "saving";
      state.saveMessage = "";
      state.settings = normalizeSettings(nextSettings);
      applyVisualSettings();
      broadcastSettingsUpdate();
      render();

      try {
        const payload = await fetchJson("/api/v1/settings", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(state.settings)
        });
        state.settings = normalizeSettings(payload);
        state.settingsStorage = "server";
        state.saveMessage = "";
        showToast(t("savedOnHost"), t("sharedPreferences"), "ok");
      } catch (_error) {
        writeStorage(SETTINGS_FALLBACK_KEY, JSON.stringify(state.settings));
        state.settingsStorage = "browser";
        state.saveMessage = t("browserFallback");
        showToast(t("browserFallback"), t("sharedPreferences"), "warn");
      }

      state.saveState = "saved";
      window.clearTimeout(state.saveResetTimer);
      state.saveResetTimer = window.setTimeout(() => {
        state.saveState = "idle";
        render();
      }, 1400);
      render();
    }

    function normalizeViewerKind(kind) {
      const normalized = String(kind || "").trim().toLowerCase();
      if (["desktop", "phone", "tablet", "display"].includes(normalized)) {
        return normalized;
      }
      return "desktop";
    }

    function viewerFallback() {
      const ua = String(navigator.userAgent || "").toLowerCase();
      if (/iphone|android.+mobile|mobile/.test(ua)) {
        return { viewer_kind: "phone", title: t("phoneViewerLabel"), value: "PH" };
      }
      if (/ipad|tablet/.test(ua)) {
        return { viewer_kind: "tablet", title: t("tabletViewerLabel"), value: "TB" };
      }
      return { viewer_kind: "desktop", title: t("desktopViewerLabel"), value: "PC" };
    }

    function resolveCurrentViewer(snapshot) {
      const viewers = Array.isArray((snapshot || {}).viewers) ? snapshot.viewers : [];
      const viewerId = readStorage(VIEWER_STORAGE_KEY) || "";
      const matched = viewers.find((item) => String(item.viewer_id || "") === viewerId);
      if (matched) {
        const matchedKind = normalizeViewerKind(matched.viewer_kind);
        return {
          viewer_id: String(matched.viewer_id || ""),
          viewer_kind: matchedKind,
          title: String(matched.title || formatViewerKind(matchedKind)),
          value: String(matched.value || viewerFallback().value),
          page: String(matched.page || window.location.pathname || "/"),
          address: String(matched.address || "")
        };
      }

      const fallback = viewerFallback();
      return {
        viewer_id: viewerId,
        viewer_kind: fallback.viewer_kind,
        title: fallback.title,
        value: fallback.value,
        page: `${window.location.pathname || "/"}${window.location.search || ""}`,
        address: window.location.hostname || ""
      };
    }

    function normalizeSync(raw) {
      const payload = raw && typeof raw === "object" ? raw : {};
      return {
        enabled: !!payload.enabled,
        state: String(payload.state || "pending"),
        peer_reachable: !!payload.peer_reachable,
        peer_sync_ready: !!payload.peer_sync_ready,
        last_sync_ms: numberValue(payload.last_sync_ms, 0),
        last_error: String(payload.last_error || ""),
        summary: String(payload.summary || ""),
        domains: Array.isArray(payload.domains) ? payload.domains : []
      };
    }

    function normalizeStorage(raw) {
      const payload = raw && typeof raw === "object" ? raw : {};
      return {
        storage_kind: String(payload.storage_kind || payload.storage || "filesystem"),
        content_root: String(payload.content_root || ""),
        content_root_state: String(payload.content_root_state || "unknown"),
        content_root_exists: !!payload.content_root_exists,
        summary: String(payload.summary || ""),
        paths: Array.isArray(payload.paths) ? payload.paths : []
      };
    }

    async function refreshRuntime() {
      try {
        const snapshot = await fetchJson("/api/v1/shell/snapshot");
        state.snapshot = snapshot;
        state.sync = normalizeSync(snapshot.sync || {});
        state.storage = normalizeStorage(snapshot.storage || {});
        state.currentViewer = resolveCurrentViewer(snapshot);
        state.runtimeError = "";
      } catch (error) {
        state.runtimeError = `Settings runtime load error: ${error}`;
      }
      render();
    }

    function currentNode() {
      return (((state.snapshot || {}).nodes || {}).current || {});

    function compactPathLabel(value) {
      const text = String(value || "").trim();
      if (!text) {
        return "-";
      }
      if (text.length <= 44) {
        return text;
      }
      const normalized = text.replace(/\\/g, "/");
      const segments = normalized.split("/").filter(Boolean);
      if (segments.length <= 4) {
        return text;
      }
      return `.../${segments.slice(-4).join("/")}`;
    }

    function infoRow(label, value) {
      return `<div class="info-row"><strong>${esc(label)}</strong><span>${esc(value)}</span></div>`;

    function formatBytes(value) {
      const bytes = Number(value || 0);
      if (!Number.isFinite(bytes) || bytes <= 0) {
        return "0 MB";
      }
      const units = ["B", "KB", "MB", "GB", "TB"];
      let size = bytes;
      let unit = 0;
      while (size >= 1024 && unit < units.length - 1) {
        size /= 1024;
        unit += 1;
      }
      const digits = unit <= 1 ? 0 : size >= 10 ? 1 : 2;
      return `${size.toFixed(digits)} ${units[unit]}`;
    }

    function formatDateTime(ms) {
      if (!ms) {
        return t("notYet");
      }
      const locale = state.settings.interface.language === "ru" ? "ru-RU" : "en-US";
      return new Date(ms).toLocaleString(locale);
    }

    function formatRelativeTime(ms) {
      if (!ms) {
        return t("notYet");
      }
      const diff = Date.now() - ms;
      if (diff < 10000) {
        return state.settings.interface.language === "ru" ? "только что" : "just now";
      }

      const minutes = Math.round(diff / 60000);
      if (minutes < 60) {
        return state.settings.interface.language === "ru"
          ? `${minutes} мин назад`
          : `${minutes} min ago`;
      }

      const hours = Math.round(minutes / 60);
      if (hours < 48) {
        return state.settings.interface.language === "ru"
          ? `${hours} ч назад`
          : `${hours} hr ago`;
      }

      const days = Math.round(hours / 24);
      return state.settings.interface.language === "ru"
        ? `${days} дн назад`
        : `${days} day ago`;
    }

      if (hostname === "127.0.0.1" || hostname === "localhost") {

      if (host.kind === "desktop_host") {

          title: t("constructor"),
          summary: t("constructorLead"),
          searchText: `${t("constructor")} ${t("createModule")} ${t("addComponent")} ${t("moduleName")} ${t("componentName")}`.toLowerCase(),
          html: `
            <section class="card section-panel" id="constructor" data-section-id="constructor">
              <div class="section-head"${tooltipAttrs(tooltipPayload(t("constructor"), t("constructorLead"), [], t("moduleConstructor")))}>
                <div>
                  <div class="section-kicker">${esc(t("moduleConstructor"))}</div>
                  <h2 class="section-title">${esc(t("constructor"))}</h2>
                </div>
              </div>
              <div class="constructor-grid">
                ${detailCard(t("createModule"), t("createModule"), tooltipPayload(t("createModule"), t("constructorLead")), `
                  <div class="button-row">
                    <button class="action-button" type="button" data-action="open-constructor"${tooltipAttrs(tooltipPayload(t("createModule"), t("constructorLead")))}>${esc(t("createModule"))}</button>
                    <button class="ghost-button" type="button" data-action="open-constructor"${tooltipAttrs(tooltipPayload(t("addComponent"), t("constructorLead")))}>${esc(t("addComponent"))}</button>
                  </div>
                  <div class="note-box">${esc(t("constructorStaged"))}</div>
                `)}
              </div>
            </section>
          `
        },
        {
          id: "diagnostics",
          title: t("diagnostics"),
          summary: t("diagnosticsLead"),
          searchText: `${t("diagnostics")} ${t("shellSnapshot")} ${t("settingsPayload")} ${t("sync")}`.toLowerCase(),
          html: `
            <section class="card section-panel" id="diagnostics" data-section-id="diagnostics">
              <details class="diagnostics-details">
                <summary>${esc(t("diagnostics"))}</summary>
                ${state.runtimeError ? `<div class="note-box">${esc(state.runtimeError)}</div>` : ""}
                ${state.settings.interface.show_advanced_diagnostics ? `
                  <div class="diagnostics-stack">
                    <details>
                      <summary>${esc(t("shellSnapshot"))}</summary>
                      <pre class="code-block">${esc(JSON.stringify(state.snapshot || {}, null, 2))}</pre>
                    </details>
                    <details>
                      <summary>${esc(t("sync"))}</summary>
                      <pre class="code-block">${esc(JSON.stringify(state.sync || {}, null, 2))}</pre>
                    </details>
                    <details>
                      <summary>${esc(t("storage"))}</summary>
                      <pre class="code-block">${esc(JSON.stringify(state.storage || {}, null, 2))}</pre>
                    </details>
                    <details>
                      <summary>${esc(t("settingsPayload"))}</summary>
                      <pre class="code-block">${esc(JSON.stringify(state.settings || {}, null, 2))}</pre>
                    </details>
                  </div>
                ` : `
                  <div class="diagnostics-stack">
                    ${["shellSnapshot", "sync", "storage", "settingsPayload"].map((key) => `
                      <button class="ghost-button is-disabled" type="button" aria-disabled="true"${tooltipAttrs(tooltipPayload(t(key), t("diagnosticsHidden")))}>${esc(t(key))}</button>
                    `).join("")}
                  </div>
                `}
              </details>
            </section>
          `
        }
      ];
    }

    function filteredSections() {
      const query = state.searchQuery.trim().toLowerCase();
      return buildSections().filter((section) => matchesSearch(section, query));
    }

    function renderHero() {
      document.getElementById("hero").innerHTML = `
        <div class="hero-head">
          <div class="hero-copy">
            <h1>${esc(t("pageTitle"))}</h1>
          </div>
        </div>
      `;
    }

    function renderRail() {
      const sections = filteredSections();
      ensureActiveSection(sections);
      document.getElementById("settings-rail").innerHTML = `
        <div class="rail-block">
          <h2 class="rail-title"${tooltipAttrs(tooltipPayload(t("searchSettings"), t("searchLead")))}>${esc(t("searchSettings"))}</h2>
          <div class="search-shell">
            <input class="search-input" type="search" data-action="search-settings" placeholder="${esc(t("searchPlaceholder"))}" value="${esc(state.searchQuery)}"${tooltipAttrs(tooltipPayload(t("searchSettings"), t("searchLead")))}>
          </div>
        </div>
        <div class="rail-block">
          <div class="rail-nav">
            ${sections.map((section) => `
              <button class="rail-button" type="button" data-section-target="${esc(section.id)}" data-active="${section.id === state.activeSection ? "true" : "false"}"${tooltipAttrs(tooltipPayload(section.title, section.summary))}>
                <strong>${esc(section.title)}</strong>
              </button>
            `).join("")}
          </div>
        </div>
        <div class="rail-block">
          <div class="rail-actions">
            <a class="action-button" href="/"${tooltipAttrs(tooltipPayload(t("backToShell"), t("toolbarHint")))}>${esc(t("backToShell"))}</a>
            <a class="action-button" href="/gallery"${tooltipAttrs(tooltipPayload(t("gallery"), t("quickGalleryTip")))}>${esc(t("gallery"))}</a>
            <a class="action-button" href="/service"${tooltipAttrs(tooltipPayload(t("laboratory"), t("quickLaboratoryTip")))}>${esc(t("laboratory"))}</a>
            <a class="ghost-button" href="/content"${tooltipAttrs(tooltipPayload(t("openStorageDiagnostics"), t("storageDiagnosticsTip")))}>${esc(t("openStorageDiagnostics"))}</a>
            <button class="ghost-button" type="button" data-action="refresh-runtime"${tooltipAttrs(tooltipPayload(t("refreshStatus"), t("refreshPageTip")))}>${esc(t("refreshStatus"))}</button>
          </div>
        </div>
      `;
    }

    function renderDetail() {
      const sections = filteredSections();
      ensureActiveSection(sections);
      syncHash(state.activeSection);
      const detail = document.getElementById("settings-detail");
      if (!sections.length) {
        detail.innerHTML = `
          <section class="empty-state">
            <h2>${esc(t("searchEmptyTitle"))}</h2>
            <p class="muted">${esc(t("searchEmptyBody"))}</p>
          </section>
        `;
        return;
      }
      const renderedSections = isMobileSectionLayout()
        ? sections.filter((section) => section.id === state.activeSection)
        : sections;
      detail.innerHTML = renderedSections.map((section) => section.html).join("");
      if (state.pendingScrollId) {
        const targetId = state.pendingScrollId;
        state.pendingScrollId = "";
        window.requestAnimationFrame(() => {
          const element = document.getElementById(targetId);
          if (element) {
            element.scrollIntoView({ behavior: "smooth", block: "start" });
          }
        });
      }
    }

    function render(preserveSearchFocus) {
      const hadSearchFocus = preserveSearchFocus;
      applyVisualSettings();
      renderHero();
      renderRail();
      renderDetail();
      const existingModal = document.getElementById("constructor-modal-root");
      if (existingModal) {
        existingModal.remove();
      }
      if (state.constructorOpen) {
        const modalRoot = document.createElement("div");
        modalRoot.id = "constructor-modal-root";
        modalRoot.innerHTML = renderConstructorModal();
        document.body.appendChild(modalRoot);
      }
      if (hadSearchFocus) {
        const input = document.querySelector("[data-action='search-settings']");
        if (input instanceof HTMLInputElement) {
          input.focus();
          input.setSelectionRange(input.value.length, input.value.length);
        }
      }
    }

    async function copyText(text, successLabel) {
      const value = String(text || "").trim();
      if (!value) {
        return;
      }
      try {
        if (navigator.clipboard && navigator.clipboard.writeText) {
          await navigator.clipboard.writeText(value);
        } else {
          const field = document.createElement("textarea");
          field.value = value;
          field.style.position = "fixed";
          field.style.opacity = "0";
          document.body.appendChild(field);
          field.select();
          document.execCommand("copy");
          field.remove();
        }
        showToast(t("copySuccess"), successLabel || value, "ok");
      } catch (error) {
        showToast(t("fault"), String(error), "fault");
      }
    }

    async function openFolder(targetId) {
      try {
        const payload = await fetchJson(`/api/v1/host/open?target=${encodeURIComponent(targetId)}`, {
          method: "POST"
        });
        showToast(t("openFolderQueued"), String(payload.message || targetId), payload.accepted ? "ok" : "warn");
      } catch (error) {
        showToast(t("openFolderBlocked"), String(error), "warn");
      }
    }

    async function cleanupStorage(targetId, confirmDelete) {
      try {
        const payload = await fetchJson(`/api/v1/content/cleanup?target=${encodeURIComponent(targetId)}&confirm=${confirmDelete ? "1" : "0"}`, {
          method: "POST"
        });
        showToast(
          confirmDelete ? t("cleanupDelete") : t("cleanupPreview"),
          `${formatBytes(payload.total_bytes)} · ${payload.file_count || 0} ${t("files")}`,
          payload.accepted ? "ok" : "warn"
        );
        if (confirmDelete) {
          await refreshRuntime();
        }
      } catch (error) {
        showToast(t("fault"), String(error), "fault");
      }
    }

    async function syncNow() {
      try {
        await fetchJson("/api/v1/sync/refresh", { method: "POST" });
        await refreshRuntime();
        showToast(t("syncNow"), t("ready"), "ok");
      } catch (error) {
        showToast(t("fault"), String(error), "fault");
      }
    }

    document.addEventListener("input", (event) => {
      const target = event.target;
      if (!(target instanceof HTMLInputElement)) {
        return;
      }
      if (target.dataset.action === "search-settings") {
        state.searchQuery = String(target.value || "").trim().toLowerCase();
        render(true);
      }
    });

    document.addEventListener("change", (event) => {
      const target = event.target;
      if (!(target instanceof HTMLInputElement)) {
        return;
      }
      if (target.dataset.action === "search-settings") {
        return;
      }
      const path = target.dataset.settingPath;
      if (!path) {
        return;
      }
      const nextSettings = clone(state.settings);
      const rawValue = target.type === "checkbox" ? target.checked : target.value;
      const persistValue = async () => {
        if (path === "interface.fullscreen_enabled") {
          return applyFullscreenMode(Boolean(rawValue));
        }
        return rawValue;
      };
      persistValue().then((value) => {
        setDeepValue(nextSettings, path, value);
        return saveSettings(nextSettings);
      }).catch((error) => {
        state.runtimeError = `Settings save error: ${error}`;
        render();
      });
    });

    window.addEventListener("smart-platform:settings-updated", (event) => {
      const detail = event instanceof CustomEvent ? event.detail : null;
      if (!detail || typeof detail !== "object") {
        return;
      }
      state.settings = normalizeSettings(detail);
      applyVisualSettings();
      render();
    });

    window.addEventListener("smart-platform:fullscreen-updated", (event) => {
      const detail = event instanceof CustomEvent ? event.detail : null;
      if (!detail || typeof detail !== "object") {
        return;
      }
      const nextSettings = clone(state.settings);
      setDeepValue(nextSettings, "interface.fullscreen_enabled", Boolean(detail.fullscreen_enabled));
      state.settings = normalizeSettings(nextSettings);
      applyVisualSettings();
      render();
    });

    document.addEventListener("click", (event) => {
      const target = event.target instanceof HTMLElement
        ? event.target.closest("[data-action], [data-section-target]")
        : null;
      if (!target) {
        return;
      }

      if (target.getAttribute("aria-disabled") === "true") {
        event.preventDefault();
        return;
      }

      const sectionTarget = target.getAttribute("data-section-target");
      if (sectionTarget) {
        state.activeSection = sectionTarget;
        state.pendingScrollId = sectionTarget;
        render();
        return;
      }

      const action = target.getAttribute("data-action");
      if (!action) {
        return;
      }

      if (action === "refresh-runtime") {
        refreshRuntime().catch(() => {});
        return;
      }

      if (action === "clear-search") {
        state.searchQuery = "";
        render();
        return;
      }

      if (action === "copy-current-url") {
        copyText(window.location.href, window.location.href);
        return;
      }

      if (action === "copy-server-url") {
        copyText(String(runtimeHost().server_url || window.location.origin), String(runtimeHost().server_url || window.location.origin));
        return;
      }

      if (action === "copy-path") {
        copyText(target.getAttribute("data-path") || "", target.getAttribute("data-path") || "");
        return;
      }

      if (action === "open-folder") {
        openFolder(target.getAttribute("data-target") || "");
        return;
      }

      if (action === "cleanup-preview") {
        cleanupStorage(target.getAttribute("data-target") || "", false);
        return;
      }

      if (action === "cleanup-delete") {
        const targetId = target.getAttribute("data-target") || "";
        const message = `${t("cleanupConfirm")}: ${targetId}`;
        if (window.confirm(message)) {
          cleanupStorage(targetId, true);
        }
        return;
      }

      if (action === "sync-now") {
        syncNow();
        return;
      }

      if (action === "open-constructor") {
        state.constructorOpen = true;
        state.constructorStep = 1;
        render();
        return;
      }

      if (action === "close-constructor") {
        state.constructorOpen = false;
        render();
        return;
      }

      if (action === "constructor-next") {
        state.constructorStep = Math.min(3, state.constructorStep + 1);
        render();
        return;
      }

      if (action === "constructor-prev") {
        state.constructorStep = Math.max(1, state.constructorStep - 1);
        render();
        return;
      }

      if (action === "constructor-save") {
        showToast(t("draftSaved"), t("constructorStaged"), "ok");
        state.constructorOpen = false;
        render();
        return;
      }

      if (action === "local-component-test") {
        showToast(t("testControl"), t("simulatedOnly"), "warn");
        return;
      }

    });

    window.addEventListener("hashchange", () => {
      const sectionId = sectionIdFromHash(window.location.hash);
      if (!sectionId) {
        return;
      }
      state.activeSection = sectionId;
      state.pendingScrollId = sectionId;
      render();
    });

    window.addEventListener("resize", () => {
      render();
    });

    async function initialize() {
      bindTooltipEvents();
      const initialSection = sectionIdFromHash(window.location.hash);
      if (initialSection) {
        state.activeSection = initialSection;
        state.pendingScrollId = initialSection;
      }
      render();
      await loadSettings();
      render();
      await refreshRuntime();
      window.setInterval(() => {
        refreshRuntime().catch(() => {});
      }, 5000);
    }

    initialize().catch((error) => {
      state.runtimeError = `Settings bootstrap error: ${error}`;
      render();
    });
  </script>
</body>
</html>
