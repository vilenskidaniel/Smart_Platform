<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Smart Platform</title>
  <style>
    :root {
      --bg: #e8efe4;
      --panel: rgba(250, 252, 247, 0.88);
      --panel-strong: rgba(255, 255, 255, 0.92);
      --ink: #1e2d23;
      --muted: #5f7262;
      --line: rgba(53, 88, 63, 0.12);
      --accent: #2d5d43;
      --button-bg: rgba(45, 93, 67, 0.08);
      --button-line: rgba(45, 93, 67, 0.18);
      --shadow: 0 22px 54px rgba(21, 36, 26, 0.12);
      --radius: 26px;
      --radius-sm: 18px;
      --ok-bg: rgba(46, 125, 78, 0.14);
      --ok-ink: #2f7d4d;
      --warn-bg: rgba(202, 142, 28, 0.16);
      --warn-ink: #926014;
      --fault-bg: rgba(184, 56, 56, 0.14);
      --fault-ink: #9f3434;
      --idle-bg: rgba(109, 118, 112, 0.12);
      --idle-ink: #647068;
      --home-width: 960px;
      --sans: "Segoe UI", "Trebuchet MS", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: var(--sans);
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(77, 119, 85, 0.18), transparent 32%),
        radial-gradient(circle at bottom right, rgba(44, 106, 111, 0.08), transparent 28%),
        linear-gradient(180deg, #f3f7ef 0%, var(--bg) 100%);
    }

    a,
    button {
      font: inherit;
    }

    .app-shell {
      max-width: 1120px;
      margin: 0 auto;
      padding: 18px 14px 44px;
    }

    .topbar {
      position: sticky;
      top: 12px;
      z-index: 20;
      display: grid;
      gap: 12px;
      padding: 14px;
      border-radius: 30px;
      border: 1px solid var(--line);
      background: rgba(249, 252, 246, 0.86);
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
    }

    .topbar-main {
      display: grid;
      gap: 12px;
      grid-template-columns: minmax(220px, auto) minmax(280px, 1fr) minmax(320px, auto);
      align-items: start;
    }

    .bar-left,
    .bar-center,
    .bar-right,
    .moisture-strip {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    .bar-center {
      justify-content: center;
    }

    .bar-right {
      justify-content: flex-end;
    }

    .home-button,
    .control-button {
      appearance: none;
      border: 1px solid var(--button-line);
      background: var(--button-bg);
      color: var(--ink);
      border-radius: 16px;
      min-height: 46px;
      padding: 10px 12px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      text-decoration: none;
      cursor: pointer;
      transition: transform 150ms ease, box-shadow 150ms ease, background 150ms ease;
    }

    .home-button:hover,
    .control-button:hover,
    .home-button:focus-visible,
    .control-button:focus-visible,
    .launcher-card:hover,
    .launcher-card:focus-visible,
    .card-action:hover,
    .card-action:focus-visible {
      transform: translateY(-1px);
      box-shadow: 0 14px 28px rgba(21, 36, 26, 0.12);
      outline: none;
    }

    .home-button {
      width: 46px;
      padding: 0;
      border-radius: 14px;
      background: linear-gradient(180deg, rgba(45, 93, 67, 0.18), rgba(45, 93, 67, 0.08));
    }

    .control-button[aria-pressed="true"] {
      background: rgba(45, 93, 67, 0.16);
      border-color: rgba(45, 93, 67, 0.26);
      color: var(--accent);
    }

    .token,
    .moisture-lane {
      appearance: none;
      border: 1px solid transparent;
      border-radius: 999px;
      min-height: 42px;
      padding: 9px 12px;
      display: inline-flex;
      align-items: center;
      gap: 9px;
      background: var(--panel-strong);
      color: var(--ink);
      cursor: pointer;
      transition: transform 140ms ease, box-shadow 140ms ease, border-color 140ms ease;
    }

    .token:hover,
    .token:focus-visible,
    .moisture-lane:hover,
    .moisture-lane:focus-visible {
      transform: translateY(-1px);
      box-shadow: 0 12px 24px rgba(21, 36, 26, 0.1);
      outline: none;
    }

    .token[data-state="online"],
    .moisture-lane[data-state="online"] {
      background: var(--ok-bg);
      color: var(--ok-ink);
      border-color: rgba(47, 125, 77, 0.18);
    }

    .token[data-state="attention"],
    .moisture-lane[data-state="attention"] {
      background: var(--warn-bg);
      color: var(--warn-ink);
      border-color: rgba(146, 96, 20, 0.18);
    }

    .token[data-state="fault"],
    .moisture-lane[data-state="fault"] {
      background: var(--fault-bg);
      color: var(--fault-ink);
      border-color: rgba(159, 52, 52, 0.18);
    }

    .token[data-state="neutral"],
    .moisture-lane[data-state="neutral"] {
      background: var(--idle-bg);
      color: var(--idle-ink);
      border-color: rgba(100, 112, 104, 0.14);
    }

    .token[data-blink="true"],
    .moisture-lane[data-blink="true"] {
      animation: token-pulse 1.15s ease-in-out infinite;
    }

    @keyframes token-pulse {
      0%,
      100% {
        box-shadow: 0 0 0 0 rgba(202, 142, 28, 0.18);
      }
      50% {
        box-shadow: 0 0 0 8px rgba(202, 142, 28, 0);
      }
    }

    .token-icon,
    .button-icon,
    .lane-icon {
      width: 18px;
      height: 18px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex: 0 0 auto;
    }

    .token-icon svg,
    .button-icon svg,
    .lane-icon svg {
      width: 18px;
      height: 18px;
      display: block;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .token-text,
    .lane-text,
    .button-label {
      white-space: nowrap;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.01em;
    }

    .moisture-strip {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
    }

    .moisture-lane {
      justify-content: center;
      width: 100%;
      border-radius: 16px;
    }

    .bar-detail {
      min-height: 44px;
      padding: 10px 14px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.68);
      border: 1px solid var(--line);
      color: var(--muted);
      line-height: 1.5;
      font-size: 14px;
    }

    .home-main {
      width: min(100%, var(--home-width));
      margin: 28px auto 0;
      display: grid;
      gap: 18px;
    }

    .home-title {
      margin: 0;
      text-align: center;
      font-size: clamp(40px, 6vw, 72px);
      line-height: 0.95;
      letter-spacing: -0.04em;
      color: var(--accent);
    }

    .home-actions {
      display: flex;
      justify-content: center;
      gap: 10px;
    }

    .entry-action {
      appearance: none;
      border: 1px solid var(--button-line);
      background: rgba(255, 255, 255, 0.72);
      color: var(--accent);
      border-radius: 999px;
      min-height: 42px;
      padding: 10px 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      cursor: pointer;
      font-weight: 700;
      letter-spacing: 0.01em;
      box-shadow: 0 10px 24px rgba(21, 36, 26, 0.08);
      transition: transform 150ms ease, box-shadow 150ms ease, background 150ms ease;
    }

    .entry-action:hover,
    .entry-action:focus-visible {
      transform: translateY(-1px);
      box-shadow: 0 14px 28px rgba(21, 36, 26, 0.12);
      outline: none;
    }

    .entry-action[hidden] {
      display: none;
    }

    .entry-modal {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: rgba(21, 31, 24, 0.46);
      backdrop-filter: blur(10px);
      z-index: 90;
    }

    .entry-modal[hidden] {
      display: none;
    }

    .entry-modal-card {
      position: relative;
      width: min(100%, 430px);
      padding: 24px 24px 22px;
      border-radius: 28px;
      border: 1px solid rgba(45, 93, 67, 0.12);
      background: rgba(249, 252, 246, 0.96);
      box-shadow: 0 26px 60px rgba(18, 30, 22, 0.22);
      display: grid;
      gap: 14px;
    }

    .entry-modal-close {
      position: absolute;
      top: 14px;
      right: 14px;
      width: 36px;
      height: 36px;
      border-radius: 999px;
      border: 1px solid var(--button-line);
      background: rgba(45, 93, 67, 0.08);
      color: var(--accent);
      cursor: pointer;
      font-size: 20px;
      line-height: 1;
    }

    .entry-modal-close:hover,
    .entry-modal-close:focus-visible {
      background: rgba(45, 93, 67, 0.16);
      outline: none;
    }

    .entry-modal-eyebrow {
      margin: 0;
      color: var(--accent);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .entry-modal-title {
      margin: 0;
      font-size: clamp(28px, 4vw, 34px);
      line-height: 1.05;
      letter-spacing: -0.03em;
    }

    .entry-modal-copy {
      margin: 0;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.5;
    }

    .entry-modal-qr-shell {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      border-radius: 24px;
      border: 1px solid rgba(45, 93, 67, 0.12);
      background: rgba(255, 255, 255, 0.94);
      min-height: 280px;
    }

    .entry-modal-qr-shell img {
      width: min(100%, 240px);
      height: auto;
      display: block;
    }

    .entry-modal-link {
      color: var(--accent);
      word-break: break-all;
      font-size: 14px;
      line-height: 1.5;
    }

    .launcher-stack {
      display: grid;
      gap: 14px;
    }

    .launcher-card,
    .launcher-panel {
      border: 1px solid rgba(45, 93, 67, 0.1);
      border-radius: var(--radius);
      background: var(--panel);
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
    }

    .launcher-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      min-height: 96px;
      padding: 22px 24px;
      text-decoration: none;
      color: inherit;
      transition: transform 150ms ease, box-shadow 150ms ease, border-color 150ms ease;
    }

    .launcher-panel {
      padding: 20px 24px;
      display: grid;
      gap: 14px;
    }

    .launcher-copy {
      min-width: 0;
      display: grid;
      gap: 8px;
    }

    .launcher-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      width: 100%;
    }

    .launcher-name {
      margin: 0;
      font-size: clamp(24px, 4vw, 34px);
      line-height: 1;
      letter-spacing: -0.02em;
    }

    .launcher-summary {
      margin: 0;
      max-width: 720px;
      color: var(--muted);
      line-height: 1.45;
      font-size: 15px;
    }

    .card-state {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      background: var(--idle-bg);
      color: var(--idle-ink);
    }

    .card-state[data-state="online"] {
      background: var(--ok-bg);
      color: var(--ok-ink);
    }

    .card-state[data-state="attention"] {
      background: var(--warn-bg);
      color: var(--warn-ink);
    }

    .card-state[data-state="neutral"] {
      background: var(--idle-bg);
      color: var(--idle-ink);
    }

    .card-actions {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .card-action {
      appearance: none;
      border: 1px solid var(--button-line);
      background: rgba(45, 93, 67, 0.08);
      color: var(--ink);
      border-radius: 18px;
      min-height: 48px;
      padding: 12px 16px;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      letter-spacing: 0.01em;
      transition: transform 150ms ease, box-shadow 150ms ease, background 150ms ease;
    }

    .screen-reader {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @media (max-width: 1160px) {
      .topbar-main {
        grid-template-columns: 1fr;
      }

      .bar-center,
      .bar-right {
        justify-content: flex-start;
      }
    }

    @media (max-width: 980px) {
      .app-shell {
        max-width: 100%;
        padding-inline: 12px;
      }

      .home-main {
        width: 100%;
      }

      .launcher-card,
      .launcher-panel {
        padding: 18px 20px;
      }

      .launcher-head {
        align-items: flex-start;
        flex-direction: column;
      }

      .card-actions {
        grid-template-columns: 1fr;
      }
    }

    @media (max-height: 920px) and (min-width: 900px) {
      .app-shell {
        padding-top: 14px;
        padding-bottom: 26px;
      }

      .home-main {
        margin-top: 18px;
        gap: 14px;
      }

      .home-title {
        font-size: clamp(32px, 5vh, 56px);
      }

      .launcher-stack {
        gap: 10px;
      }

      .launcher-card {
        min-height: 78px;
        padding: 16px 20px;
      }

      .launcher-panel {
        gap: 10px;
        padding: 16px 20px;
      }

      .launcher-name {
        font-size: clamp(22px, 3.2vh, 30px);
      }

      .card-actions {
        gap: 8px;
      }

      .card-action {
        min-height: 42px;
        padding: 10px 14px;
      }
    }

    @media (max-height: 760px) and (min-width: 900px) {
      .home-main {
        margin-top: 14px;
      }

      .home-title {
        font-size: clamp(28px, 4.4vh, 44px);
      }

      .launcher-card {
        min-height: 70px;
        padding: 14px 18px;
      }

      .launcher-panel {
        padding: 14px 18px;
      }

      .card-action {
        min-height: 38px;
        font-size: 14px;
      }
    }

    @media (max-width: 760px) {
      .app-shell {
        padding: 12px 12px 28px;
      }

      .topbar {
        top: 8px;
        border-radius: 24px;
      }

      .moisture-strip {
        grid-template-columns: 1fr;
      }

      .launcher-card,
      .launcher-panel {
        padding: 18px;
      }

      .launcher-card,
      .launcher-head {
        align-items: flex-start;
        flex-direction: column;
      }

      .card-actions {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <main class="home-main">
      <h1 class="home-title">Smart Platform</h1>
      <div class="home-actions">
        <button class="entry-action" type="button" id="open-smartphone-entry" hidden>Open On Smartphone</button>
      </div>
      <section class="launcher-stack" id="launcher-stack"></section>
    </main>
  </div>

  <div class="entry-modal" id="mobile-entry-modal" hidden>
    <section class="entry-modal-card" role="dialog" aria-modal="true" aria-labelledby="mobile-entry-title">
      <button class="entry-modal-close" type="button" id="mobile-entry-close" aria-label="Close smartphone entry popup">&times;</button>
      <p class="entry-modal-eyebrow">Open On Smartphone</p>
      <h2 class="entry-modal-title" id="mobile-entry-title">Scan to open the current shell on your phone.</h2>
      <p class="entry-modal-copy" id="mobile-entry-copy">Use the phone camera to open the same Smart Platform page from this desktop session.</p>
      <div class="entry-modal-qr-shell">
        <img id="mobile-entry-qr" alt="QR code for opening Smart Platform on a smartphone">
      </div>
      <a class="entry-modal-link" id="mobile-entry-link" href="#" target="_blank" rel="noreferrer"></a>
    </section>
  </div>

  <script src="/static/smart_bar.js"></script>
  <script>
    const LEGACY_HASH_REDIRECTS = {
      '#logs': '/gallery?tab=reports',
      '#diagnostics': '/settings#diagnostics',
      '#settings': '/settings'
    };
    const MOBILE_ENTRY_STORAGE_KEY = 'smart-platform.mobile-entry.dismissed';

    let currentSnapshot = null;
    let mobileEntryTargetUrl = '';
    let mobileEntryAutoPromptAttempted = false;

    function redirectLegacyHash() {
      const target = LEGACY_HASH_REDIRECTS[window.location.hash];
      if (!target) {
        return false;
      }
      window.location.replace(target);
      return true;
    }

    function esc(value) {
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function readStorage(key) {
      try {
        return window.localStorage.getItem(key);
      } catch (_error) {
        return null;
      }
    }

    function writeStorage(key, value) {
      try {
        window.localStorage.setItem(key, value);
      } catch (_error) {
        return;
      }
    }

    function isLoopbackHost(hostname) {
      return hostname === '127.0.0.1' || hostname === 'localhost';
    }

    function isDesktopLikeClient() {
      const userAgent = String(navigator.userAgent || '').toLowerCase();
      return !/android|iphone|ipad|ipod|mobile|tablet/.test(userAgent);
    }

    function mobileEntryDismissKey(targetUrl) {
      try {
        return `${MOBILE_ENTRY_STORAGE_KEY}:${new URL(targetUrl).origin}`;
      } catch (_error) {
        return MOBILE_ENTRY_STORAGE_KEY;
      }
    }

    function mobileEntryDismissed(targetUrl) {
      return readStorage(mobileEntryDismissKey(targetUrl)) === '1';
    }

    function markMobileEntryDismissed(targetUrl) {
      writeStorage(mobileEntryDismissKey(targetUrl), '1');
    }

    function resolveMobileEntryUrl(snapshot) {
      const shell = (snapshot && snapshot.current_shell) || {};
      const shellBaseUrl = String(shell.shell_base_url || '').trim();
      if (shellBaseUrl) {
        try {
          const baseUrl = new URL(shellBaseUrl, window.location.href);
          if (!isLoopbackHost(baseUrl.hostname)) {
            return new URL(`${window.location.pathname}${window.location.search}${window.location.hash}`, `${baseUrl.origin}/`).toString();
          }
        } catch (_error) {
        }
      }

      try {
        const currentUrl = new URL(window.location.href);
        if (!isLoopbackHost(currentUrl.hostname)) {
          return currentUrl.toString();
        }
      } catch (_error) {
      }

      return '';
    }

    function setMobileEntryActionState(targetUrl) {
      const action = document.getElementById('open-smartphone-entry');
      if (!action) {
        return;
      }

      if (!targetUrl || !isDesktopLikeClient()) {
        action.hidden = true;
        return;
      }

      action.hidden = false;
      action.title = 'Show the QR code for opening this Smart Platform page on a smartphone.';
    }

    function hideMobileEntryPrompt(persist) {
      const modal = document.getElementById('mobile-entry-modal');
      if (!modal) {
        return;
      }
      modal.hidden = true;
      if (persist && mobileEntryTargetUrl) {
        markMobileEntryDismissed(mobileEntryTargetUrl);
      }
    }

    function showMobileEntryPrompt(targetUrl) {
      if (!targetUrl) {
        return;
      }

      mobileEntryTargetUrl = targetUrl;
      const modal = document.getElementById('mobile-entry-modal');
      const qr = document.getElementById('mobile-entry-qr');
      const link = document.getElementById('mobile-entry-link');
      const copy = document.getElementById('mobile-entry-copy');
      if (!modal || !qr || !link || !copy) {
        return;
      }

      qr.src = `/api/v1/entry/qr.svg?target=${encodeURIComponent(targetUrl)}`;
      link.href = targetUrl;
      link.textContent = targetUrl;
      copy.textContent = 'Use the phone camera to open the current Smart Platform shell over the local network.';
      modal.hidden = false;
    }

    function syncMobileEntryPrompt(snapshot) {
      const targetUrl = resolveMobileEntryUrl(snapshot);
      mobileEntryTargetUrl = targetUrl;
      setMobileEntryActionState(targetUrl);

      if (!targetUrl || !isDesktopLikeClient() || mobileEntryAutoPromptAttempted || mobileEntryDismissed(targetUrl)) {
        return;
      }

      mobileEntryAutoPromptAttempted = true;
      showMobileEntryPrompt(targetUrl);
    }

    function bindMobileEntryPrompt() {
      const action = document.getElementById('open-smartphone-entry');
      const close = document.getElementById('mobile-entry-close');
      const modal = document.getElementById('mobile-entry-modal');

      if (action) {
        action.onclick = () => {
          if (mobileEntryTargetUrl) {
            showMobileEntryPrompt(mobileEntryTargetUrl);
          }
        };
      }

      if (close) {
        close.onclick = () => hideMobileEntryPrompt(true);
      }

      if (modal) {
        modal.onclick = (event) => {
          if (event.target === modal) {
            hideMobileEntryPrompt(true);
          }
        };
      }

      document.addEventListener('keydown', (event) => {
        if (event.key === 'Escape') {
          hideMobileEntryPrompt(true);
        }
      });
    }

    function isLaptopSmoke(snapshot) {
      const shell = (snapshot && snapshot.current_shell) || {};
      const runtimeProfile = String(shell.runtime_profile || '').toLowerCase();
      if (runtimeProfile) {
        return runtimeProfile !== 'owner_device';
      }
      if (isLoopbackHost(window.location.hostname)) {
        return true;
      }
      if (!shell.shell_base_url) {
        return false;
      }
      try {
        return isLoopbackHost(new URL(shell.shell_base_url, window.location.href).hostname);
      } catch (_error) {
        return false;
      }
    }

    function resolveModule(snapshot, id) {
      return ((snapshot || {}).module_cards || []).find((module) => module.id === id) || null;
    }

    function resolveModulePath(module, fallback) {
      if (!module) {
        return fallback;
      }
      if (module.route_mode === 'local' && module.canonical_path) {
        return module.canonical_path;
      }
      if (module.route_mode === 'handoff' || module.route_mode === 'blocked') {
        return `/federated/handoff?module_id=${encodeURIComponent(module.id)}`;
      }
      return module.canonical_path || fallback;
    }

    function cardState(module, runtimePreview) {
      if (runtimePreview) {
        return { key: 'neutral', label: 'Preview' };
      }
      if (!module) {
        return { key: 'attention', label: 'Waiting' };
      }
      if (module.owner_available) {
        return { key: 'online', label: 'Ready' };
      }
      return { key: 'attention', label: 'Waiting' };
    }

    function moduleSummary(module, runtimePreview, copy) {
      if (runtimePreview) {
        return copy.preview;
      }
      if (module && module.owner_available) {
        return copy.ready;
      }
      return copy.waiting;
    }

    function renderLauncher(snapshot) {
      const runtimePreview = isLaptopSmoke(snapshot);
      const irrigation = resolveModule(snapshot, 'irrigation');
      const turret = resolveModule(snapshot, 'turret_bridge');
      const irrigationState = cardState(irrigation, runtimePreview);
      const turretState = cardState(turret, runtimePreview);
      const irrigationSummary = moduleSummary(irrigation, runtimePreview, {
        preview: 'Preview path from desktop smoke. Open irrigation UI without claiming board ownership.',
        ready: 'ESP32 owner is available. Open zones, targets, and watering controls.',
        waiting: 'ESP32 owner is not currently available. Waiting for irrigation handoff.'
      });
      const turretSummary = moduleSummary(turret, runtimePreview, {
        preview: 'Preview path from desktop smoke. Validate manual and automatic entry flows without board ownership.',
        ready: 'Raspberry Pi owner is available. Open direct control or automation runtime.',
        waiting: 'Raspberry Pi owner is not currently available. Waiting for turret handoff.'
      });

      document.getElementById('launcher-stack').innerHTML = `
        <a class="launcher-card" data-state="${irrigationState.key}" href="${resolveModulePath(irrigation, '/irrigation')}">
          <div class="launcher-head">
            <div class="launcher-copy">
              <h2 class="launcher-name">Irrigation</h2>
              <p class="launcher-summary">${esc(irrigationSummary)}</p>
            </div>
            <span class="card-state" data-state="${irrigationState.key}">${irrigationState.label}</span>
          </div>
        </a>

        <article class="launcher-panel">
          <div class="launcher-head">
            <div class="launcher-copy">
              <h2 class="launcher-name">Turret</h2>
              <p class="launcher-summary">${esc(turretSummary)}</p>
            </div>
            <span class="card-state" data-state="${turretState.key}">${turretState.label}</span>
          </div>
          <div class="card-actions">
            <a class="card-action" href="${resolveModulePath(turret, '/turret')}?mode=manual">Manual Control</a>
            <a class="card-action" href="${resolveModulePath(turret, '/turret')}?mode=automatic">Automatic Control</a>
          </div>
        </article>

        <a class="launcher-card" data-state="online" href="/gallery">
          <div class="launcher-head">
            <div class="launcher-copy">
              <h2 class="launcher-name">Gallery</h2>
              <p class="launcher-summary">Plants, media, and reports stay together on the shared content surface.</p>
            </div>
            <span class="card-state" data-state="online">Ready</span>
          </div>
        </a>

        <a class="launcher-card" data-state="online" href="/service">
          <div class="launcher-head">
            <div class="launcher-copy">
              <h2 class="launcher-name">Laboratory</h2>
              <p class="launcher-summary">Bring-up benches, diagnostics, and targeted service checks live here.</p>
            </div>
            <span class="card-state" data-state="online">Ready</span>
          </div>
        </a>

        <a class="launcher-card" data-state="online" href="/settings">
          <div class="launcher-head">
            <div class="launcher-copy">
              <h2 class="launcher-name">Settings</h2>
              <p class="launcher-summary">Platform policy, interface options, and sync-facing controls stay here.</p>
            </div>
            <span class="card-state" data-state="online">Ready</span>
          </div>
        </a>
      `;
    }

    async function fetchSnapshot() {
      const response = await fetch('/api/v1/shell/snapshot', { cache: 'no-store' });
      if (!response.ok) {
        throw new Error(`Snapshot request failed: ${response.status}`);
      }
      return response.json();
    }

    async function refresh() {
      currentSnapshot = await fetchSnapshot();
      renderLauncher(currentSnapshot);
      syncMobileEntryPrompt(currentSnapshot);
    }

    if (!redirectLegacyHash()) {
      bindMobileEntryPrompt();
      refresh().catch((error) => {
        document.getElementById('launcher-stack').innerHTML = `
          <article class="launcher-panel">
            <div class="launcher-head">
              <h2 class="launcher-name">Smart Platform</h2>
              <span class="card-state" data-state="attention">Error</span>
            </div>
            <p>Home screen failed to load: ${esc(error)}</p>
          </article>
        `;
      });

      setInterval(() => {
        refresh().catch(() => {});
      }, 5000);

    }
  </script>
</body>
</html>
